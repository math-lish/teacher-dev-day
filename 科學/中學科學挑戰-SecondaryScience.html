<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中學科學知識大挑戰</title>
    <!-- 引入 Tailwind CSS 以實現快速且優美的響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 簡單的淡入動畫 */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 選項按鈕點擊效果 */
        .option-btn {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-indigo-800 to-purple-900 min-h-screen flex items-center justify-center p-4 md:p-8 font-sans antialiased text-gray-800">

    <!-- 遊戲主容器 -->
    <div id="app" class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden relative">
        <!-- 內容將由 JavaScript 動態渲染 -->
    </div>

    <script>
        // 題庫資料 (10題：物理、化學、生物混合)
        const questions = [
            {
                subject: "物理",
                question: "哪一種力使拋向空中的物體最終會掉落到地面？",
                options: ["磁力", "摩擦力", "重力", "浮力"],
                correct: 2,
                explanation: "重力是地球吸引物體的力，這使得所有具有質量的物體在沒有支撐的情況下都會掉向地面。"
            },
            {
                subject: "化學",
                question: "我們日常飲用的「水」，其化學式是什麼？",
                options: ["CO₂", "H₂O", "O₂", "NaCl"],
                correct: 1,
                explanation: "水分子是由兩個氫原子 (H) 和一個氧原子 (O) 結合而成的，因此化學式為 H₂O。"
            },
            {
                subject: "生物",
                question: "植物在進行光合作用時，主要會從空氣中吸收哪一種氣體？",
                options: ["氧氣", "氮氣", "二氧化碳", "氫氣"],
                correct: 2,
                explanation: "植物在光合作用中吸收空氣中的「二氧化碳」和水，並利用陽光將其轉化為葡萄糖和「氧氣」。"
            },
            {
                subject: "物理",
                question: "光在真空中的傳播速度大約是多少？",
                options: ["每秒 3 萬公里", "每秒 30 萬公里", "每秒 300 萬公里", "每秒 3000 萬公里"],
                correct: 1,
                explanation: "光速是目前已知宇宙中最快的速度，大約為每秒 299,792 公里，我們通常約略記為每秒 30 萬公里。"
            },
            {
                subject: "化學",
                question: "哪一種金屬元素在常溫常壓下是呈現「液態」的？",
                options: ["鐵 (Fe)", "銅 (Cu)", "汞 / 水銀 (Hg)", "金 (Au)"],
                correct: 2,
                explanation: "汞 (Hg)，俗稱水銀，是唯一在常溫常壓下呈液態的金屬元素，過去常被用於溫度計或氣壓計中。"
            },
            {
                subject: "生物",
                question: "人體血液中，負責將氧氣輸送到全身各處的細胞是？",
                options: ["白血球", "紅血球", "血小板", "神經細胞"],
                correct: 1,
                explanation: "紅血球內含有血紅素（血紅蛋白），能夠與肺部的氧氣結合，並隨著血液循環將氧氣運送到身體各個組織。"
            },
            {
                subject: "物理",
                question: "聲音在下列哪一種介質中傳播的速度最快？",
                options: ["真空", "氣體 (如空氣)", "液體 (如水)", "固體 (如鋼鐵)"],
                correct: 3,
                explanation: "聲音的傳播需要介質（真空中無法傳聲）。固體中的粒子排列最緊密，因此聲波在固體中傳遞能量的速度最快。"
            },
            {
                subject: "化學",
                question: "下列哪一種日常物質的水溶液呈現「酸性」？",
                options: ["小蘇打水", "肥皂水", "檸檬汁", "純水"],
                correct: 2,
                explanation: "檸檬汁含有檸檬酸，pH值小於7，呈現酸性。小蘇打和肥皂水呈鹼性（pH>7），純水為中性（pH=7）。"
            },
            {
                subject: "生物",
                question: "儲存生命遺傳信息的分子「DNA」，其完整的中文名稱是什麼？",
                options: ["核糖核酸", "去氧核糖核酸", "氨基酸", "脂肪酸"],
                correct: 1,
                explanation: "DNA的中文全名是「去氧核糖核酸」(Deoxyribonucleic acid)。而「核糖核酸」則是 RNA 的全名。"
            },
            {
                subject: "綜合",
                question: "在整個宇宙中，含量最豐富的元素是什麼？",
                options: ["氧 (O)", "碳 (C)", "氦 (He)", "氫 (H)"],
                correct: 3,
                explanation: "氫 (H) 是宇宙中最輕、結構最簡單的元素，佔了宇宙中所有可見物質質量的大約 75%。恆星主要就是由氫組成的。"
            }
        ];

        // 遊戲狀態變數
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        // 獲取主容器
        const app = document.getElementById('app');

        // 初始化遊戲 (開始畫面)
        function initGame() {
            currentIdx = 0;
            score = 0;
            app.innerHTML = `
                <div class="p-8 md:p-14 text-center fade-in">
                    <div class="mb-8 flex justify-center">
                        <div class="bg-indigo-100 p-5 rounded-full">
                            <svg class="w-20 h-20 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                            </svg>
                        </div>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4 tracking-tight">中學科學知識大挑戰</h1>
                    <p class="text-gray-600 mb-10 text-lg md:text-xl leading-relaxed">
                        準備好挑戰你的物理、化學和生物知識了嗎？<br>
                        共有 10 道精心設計的題目，來測試看看你能拿幾分！
                    </p>
                    <button onclick="renderQuestion()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg py-4 px-10 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                        開始挑戰 🚀
                    </button>
                </div>
            `;
        }

        // 渲染題目畫面
        function renderQuestion() {
            answered = false;
            const q = questions[currentIdx];
            const progress = (currentIdx / questions.length) * 100;

            // 根據科目給予不同的標籤顏色
            let subjectColor = "bg-blue-100 text-blue-800";
            if (q.subject === "物理") subjectColor = "bg-purple-100 text-purple-800";
            if (q.subject === "化學") subjectColor = "bg-green-100 text-green-800";
            if (q.subject === "生物") subjectColor = "bg-emerald-100 text-emerald-800";

            app.innerHTML = `
                <div class="p-6 md:p-10 fade-in">
                    <!-- 進度條區塊 -->
                    <div class="mb-8">
                        <div class="flex justify-between text-sm font-bold text-gray-500 mb-3">
                            <span>第 ${currentIdx + 1} 題 / 共 ${questions.length} 題</span>
                            <span>進度 ${Math.round(progress)}%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-3 shadow-inner overflow-hidden">
                            <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-700 ease-out" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <!-- 題目標籤與內容 -->
                    <div class="mb-6 flex items-center">
                        <span class="px-3 py-1 rounded-full text-sm font-bold ${subjectColor} mr-3 shadow-sm">${q.subject}</span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-snug">${q.question}</h2>

                    <!-- 選項按鈕 -->
                    <div class="space-y-4" id="options-container">
                        ${q.options.map((opt, i) => `
                            <button onclick="handleSelect(${i})" class="option-btn w-full text-left p-5 border-2 border-gray-200 rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 transition-all font-semibold text-gray-700 text-lg group flex items-center justify-between shadow-sm">
                                <span>${opt}</span>
                                <span class="indicator w-7 h-7 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-indigo-400 transition-colors"></span>
                            </button>
                        `).join('')}
                    </div>

                    <!-- 解釋與反饋區塊 (預設隱藏) -->
                    <div id="feedback-area" class="mt-8 hidden rounded-2xl p-6 shadow-sm transform transition-all">
                        <div class="flex items-center mb-3">
                            <span id="feedback-icon" class="mr-3"></span>
                            <h3 id="feedback-title" class="text-xl font-bold"></h3>
                        </div>
                        <p id="feedback-text" class="text-gray-700 text-base leading-relaxed md:text-lg"></p>
                    </div>

                    <!-- 下一步按鈕 (預設隱藏) -->
                    <div class="mt-8 text-right hidden" id="next-btn-container">
                        <button onclick="nextQuestion()" class="w-full md:w-auto bg-gray-900 hover:bg-black text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 text-lg">
                            ${currentIdx === questions.length - 1 ? '查看最終成績 📊' : '下一題 ➔'}
                        </button>
                    </div>
                </div>
            `;
        }

        // 處理選項點擊
        function handleSelect(selectedIndex) {
            if (answered) return; // 避免重複作答
            answered = true;

            const q = questions[currentIdx];
            const isCorrect = selectedIndex === q.correct;
            
            if (isCorrect) {
                score++;
            }

            const buttons = document.querySelectorAll('.option-btn');
            const indicators = document.querySelectorAll('.indicator');

            // 更新選項外觀
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('hover:border-indigo-400', 'hover:bg-indigo-50', 'cursor-pointer');
                btn.classList.add('cursor-default');

                if (i === q.correct) {
                    // 正確答案的樣式
                    btn.classList.add('bg-green-50', 'border-green-500', 'text-green-900');
                    indicators[i].innerHTML = '✓';
                    indicators[i].classList.add('border-green-500', 'bg-green-500', 'text-white');
                    indicators[i].classList.remove('border-gray-300');
                } else if (i === selectedIndex && !isCorrect) {
                    // 選錯時的樣式
                    btn.classList.add('bg-red-50', 'border-red-500', 'text-red-900');
                    indicators[i].innerHTML = '✗';
                    indicators[i].classList.add('border-red-500', 'bg-red-500', 'text-white');
                    indicators[i].classList.remove('border-gray-300');
                } else {
                    // 其他未選的錯誤選項淡化
                    btn.classList.add('opacity-40');
                }
            });

            // 顯示反饋區塊
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');
            const feedbackIcon = document.getElementById('feedback-icon');

            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('fade-in');

            if (isCorrect) {
                feedbackArea.classList.add('bg-green-100', 'border', 'border-green-200');
                feedbackTitle.textContent = '答對了！🎉';
                feedbackTitle.classList.add('text-green-800');
                feedbackIcon.innerHTML = '<svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            } else {
                feedbackArea.classList.add('bg-red-100', 'border', 'border-red-200');
                feedbackTitle.textContent = '答錯了喔！💡';
                feedbackTitle.classList.add('text-red-800');
                feedbackIcon.innerHTML = '<svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }

            // 顯示科學解釋
            feedbackText.innerHTML = `<strong>解析：</strong>${q.explanation}`;

            // 顯示下一題按鈕
            document.getElementById('next-btn-container').classList.remove('hidden');
            document.getElementById('next-btn-container').classList.add('fade-in');
        }

        // 進入下一題或結算
        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= questions.length) {
                renderResult();
            } else {
                renderQuestion();
            }
        }

        // 渲染結算畫面
        function renderResult() {
            let message = "";
            let emoji = "";

            // 根據分數給予評語
            if (score === 10) {
                message = "完美滿分！你絕對是未來的科學家！";
                emoji = "🏆";
            } else if (score >= 8) {
                message = "太棒了！你的科學常識非常豐富！";
                emoji = "🌟";
            } else if (score >= 5) {
                message = "表現不錯！但還有進步的空間，繼續保持好奇心喔！";
                emoji = "👍";
            } else {
                message = "別灰心！科學的世界很廣闊，多看多學就會進步！";
                emoji = "📚";
            }

            app.innerHTML = `
                <div class="p-8 md:p-14 text-center fade-in">
                    <div class="text-7xl mb-6 transform hover:scale-110 transition-transform duration-300">${emoji}</div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-4">測驗結束！</h2>
                    <p class="text-xl text-gray-600 mb-8 font-medium">${message}</p>

                    <div class="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-3xl p-8 mb-10 inline-block shadow-sm">
                        <div class="text-sm text-indigo-800 font-bold uppercase tracking-widest mb-2">你的最終得分</div>
                        <div class="text-6xl font-extrabold text-indigo-600">
                            ${score} <span class="text-3xl text-indigo-300 font-medium">/ 10</span>
                        </div>
                    </div>

                    <div>
                        <button onclick="initGame()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg py-4 px-10 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex items-center justify-center mx-auto">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            重新挑戰一次
                        </button>
                    </div>
                </div>
            `;
        }

        // 啟動遊戲
        initGame();

    </script>
<script src="../touch-support.js"></script>
</body>
</html>
