<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中學生科學知識挑戰賽</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 30px;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: right;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* Question & Options */
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
            margin-bottom: 10px;
        }

        .cat-physics { background-color: #9b59b6; }
        .cat-chemistry { background-color: #3498db; }
        .cat-biology { background-color: #2ecc71; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .option-btn:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d5f5e3;
            border-color: var(--success-color);
            color: #1d8348;
        }

        .option-btn.wrong {
            background-color: #fadbd8;
            border-color: var(--danger-color);
            color: #943126;
        }

        /* Feedback Area */
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .feedback.correct {
            background-color: #d5f5e3;
            border-left: 5px solid var(--success-color);
        }

        .feedback.wrong {
            background-color: #fadbd8;
            border-left: 5px solid var(--danger-color);
        }

        .feedback h4 {
            margin-bottom: 5px;
        }

        /* Next Button */
        .next-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #357abd;
        }

        /* Results Screen */
        .results-screen {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .comment {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .restart-btn:hover {
            background-color: #d68910;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h1>科學知識挑戰賽</h1>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">第 1 / 10 題</div>

        <div>
            <span id="category-badge" class="category-badge">分類</span>
            <div class="question-text" id="question-text">這裡將顯示問題內容...</div>
        </div>

        <div class="options-grid" id="options-container">
            </div>

        <div class="feedback" id="feedback-container">
            <h4 id="feedback-title"></h4>
            <p id="feedback-explanation"></p>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="results-screen" class="results-screen">
        <h1>挑戰結束！</h1>
        <p>你的最終得分是：</p>
        <div class="score-display">
            <span id="final-score">0</span> / 10
        </div>
        <div class="comment" id="result-comment"></div>
        <button class="restart-btn" onclick="initGame()">重新開始挑戰</button>
    </div>
</div>

<script>
    const questions = [
        {
            category: "物理",
            catClass: "cat-physics",
            question: "下列哪個是國際單位制中用來表示「力」的單位？",
            options: ["焦耳 (J)", "瓦特 (W)", "牛頓 (N)", "帕斯卡 (Pa)"],
            answer: 2,
            explanation: "牛頓 (N) 是力的單位。焦耳是能量單位，瓦特是功率單位，帕斯卡是壓力單位。"
        },
        {
            category: "化學",
            catClass: "cat-chemistry",
            question: "地球大氣中，哪種氣體的含量最高？",
            options: ["氧氣 (O₂)", "氮氣 (N₂)", "二氧化碳 (CO₂)", "氫氣 (H₂)"],
            answer: 1,
            explanation: "地球大氣中約有78%是氮氣，氧氣佔約21%，二氧化碳等其他氣體比例很低。"
        },
        {
            category: "生物",
            catClass: "cat-biology",
            question: "細胞中被稱為「能量工廠」，負責產生ATP的細胞器是？",
            options: ["細胞核", "葉綠體", "核糖體", "粒線體 (線粒體)"],
            answer: 3,
            explanation: "粒線體是細胞進行有氧呼吸的主要場所，負責將養分轉換為細胞所需的能量 (ATP)。"
        },
        {
            category: "物理",
            catClass: "cat-physics",
            question: "聲音不能在以下哪種介質中傳播？",
            options: ["真空", "水", "空氣", "鋼鐵"],
            answer: 0,
            explanation: "聲音是一種機械波，必須依賴介質（如固體、液體或氣體）粒子的振動來傳遞，因此無法在真空中傳播。"
        },
        {
            category: "化學",
            catClass: "cat-chemistry",
            question: "純水在標準大氣壓下，其化學式和沸點分別是？",
            options: ["H₂O₂，100℃", "H₂O，100℃", "CO₂，0℃", "H₂O，0℃"],
            answer: 1,
            explanation: "水的化學式是 H₂O (兩個氫原子和一個氧原子)，在標準大氣壓下的沸點是 100℃，冰點是 0℃。"
        },
        {
            category: "生物",
            catClass: "cat-biology",
            question: "人體血液中，主要負責運送氧氣的細胞是？",
            options: ["白血球", "血小板", "紅血球", "神經細胞"],
            answer: 2,
            explanation: "紅血球內含有血紅素，能夠與氧氣結合，將氧氣從肺部運送到全身各個組織。"
        },
        {
            category: "物理",
            catClass: "cat-physics",
            question: "光在真空中的傳播速度大約是多少？",
            options: ["340 公尺/秒", "3萬 公里/秒", "30萬 公里/秒", "300萬 公里/秒"],
            answer: 2,
            explanation: "光速在真空中大約是每秒 300,000 公里 (精確值約為 299,792,458 m/s)。340公尺/秒大約是常溫下空氣中的音速。"
        },
        {
            category: "化學",
            catClass: "cat-chemistry",
            question: "在元素週期表中，化學符號為「Fe」的元素是？",
            options: ["銅", "鐵", "鋅", "銀"],
            answer: 1,
            explanation: "Fe 是鐵 (Iron) 的化學符號，源自其拉丁文名稱 Ferrum。銅是 Cu，鋅是 Zn，銀是 Ag。"
        },
        {
            category: "生物",
            catClass: "cat-biology",
            question: "正常人類的體細胞中，含有多少條染色體？",
            options: ["23條", "46條", "24條", "48條"],
            answer: 1,
            explanation: "正常人類體細胞含有 23 對（共 46 條）染色體，其中一半來自父親，一半來自母親。"
        },
        {
            category: "物理/化學",
            catClass: "cat-chemistry",
            question: "原子是由原子核和電子組成的，請問電子帶有什麼樣的電荷？",
            options: ["正電荷", "負電荷", "不帶電", "時正時負"],
            answer: 1,
            explanation: "電子帶有負電荷，質子帶正電荷，而中子不帶電。質子和中子共同構成了原子核。"
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    // DOM Elements
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackContainer = document.getElementById('feedback-container');
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackExplanation = document.getElementById('feedback-explanation');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const categoryBadge = document.getElementById('category-badge');

    function initGame() {
        currentQuestionIndex = 0;
        score = 0;
        quizScreen.style.display = 'block';
        resultsScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const currentQ = questions[currentQuestionIndex];
        
        // Update UI
        questionText.textContent = currentQ.question;
        categoryBadge.textContent = currentQ.category;
        categoryBadge.className = `category-badge ${currentQ.catClass}`;
        
        progressText.textContent = `第 ${currentQuestionIndex + 1} / ${questions.length} 題`;
        progressBar.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;

        // Reset Feedback and Next Button
        feedbackContainer.style.display = 'none';
        feedbackContainer.className = 'feedback';
        nextBtn.style.display = 'none';

        // Load Options
        optionsContainer.innerHTML = '';
        currentQ.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.textContent = option;
            button.onclick = () => selectOption(index, button);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(selectedIndex, selectedButton) {
        if (answered) return;
        answered = true;

        const currentQ = questions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        
        // Disable all buttons
        buttons.forEach(btn => btn.disabled = true);

        // Check Answer
        if (selectedIndex === currentQ.answer) {
            selectedButton.classList.add('correct');
            score++;
            showFeedback(true, currentQ.explanation);
        } else {
            selectedButton.classList.add('wrong');
            buttons[currentQ.answer].classList.add('correct'); // Highlight correct answer
            showFeedback(false, currentQ.explanation);
        }

        // Show Next Button
        nextBtn.style.display = 'block';
        if (currentQuestionIndex === questions.length - 1) {
            nextBtn.textContent = '查看成績';
        } else {
            nextBtn.textContent = '下一題';
        }
    }

    function showFeedback(isCorrect, explanation) {
        feedbackContainer.style.display = 'block';
        if (isCorrect) {
            feedbackContainer.classList.add('correct');
            feedbackTitle.textContent = '✅ 答對了！';
        } else {
            feedbackContainer.classList.add('wrong');
            feedbackTitle.textContent = '❌ 答錯了！';
        }
        feedbackExplanation.textContent = explanation;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'block';
        
        document.getElementById('final-score').textContent = score;
        const commentEl = document.getElementById('result-comment');
        
        // Update Progress Bar to 100%
        progressBar.style.width = '100%';

        let comment = '';
        if (score === 10) {
            comment = "🏆 太厲害了！你簡直是未來的科學家，完美通關！";
        } else if (score >= 7) {
            comment = "🌟 表現得很棒！你的科學基礎非常扎實。";
        } else if (score >= 4) {
            comment = "👍 不錯喔！再多複習一下，一定能拿到更好的成績！";
        } else {
            comment = "📚 科學的奧秘還有很多等待你去探索，繼續加油不要氣餒！";
        }
        commentEl.textContent = comment;
    }

    // Start the game on load
    window.onload = initGame;
</script>

<script src="../touch-support.js"></script>
</body>
</html>
