<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Finder - Preposition Game</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --success: #10B981;
            --error: #EF4444;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background-color: var(--surface);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            aspect-ratio: 4/3;
        }

        /* --- Header & Navigation --- */
        #game-header {
            padding: 20px;
            background-color: var(--primary);
            color: white;
            text-align: center;
            position: relative;
        }

        #game-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        #level-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* --- Screens --- */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* --- Menu Screen --- */
        #menu-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .level-btn {
            display: block;
            width: 80%;
            max-width: 300px;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.2rem;
            background-color: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .level-btn:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .level-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        /* --- Gameplay Area --- */
        .prompt-area {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            min-height: 40px;
            font-weight: bold;
        }

        .blank {
            display: inline-block;
            width: 100px;
            border-bottom: 2px solid var(--text-main);
            color: var(--primary);
            text-align: center;
        }

        .stage {
            flex: 1;
            position: relative;
            background-color: #f8fafc;
            border: 2px dashed var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* --- Level 1 Specifics --- */
        #level1-stage {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 150px;
            height: 150px;
            background-color: #94a3b8;
            border: 4px solid #475569;
            position: relative;
            z-index: 10;
        }

        .ball {
            width: 60px;
            height: 60px;
            background-color: #ef4444;
            border-radius: 50%;
            position: absolute;
            cursor: grab;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
            z-index: 20;
            transition: top 0.3s, left 0.3s;
        }

        .ball:active {
            cursor: grabbing;
        }

        /* Defined positions relative to the box container */
        .pos-in { top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .pos-on { top: -60px; left: 50%; transform: translateX(-50%); }
        .pos-under { top: 150px; left: 50%; transform: translateX(-50%); }
        .pos-behind { top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; opacity: 0.7;} /* Simplified behind */
        .pos-infront { top: 80%; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .pos-nextto { top: 50%; left: 160px; transform: translateY(-50%); }

        /* Dropzones for Part 1 */
        .dropzone {
            position: absolute;
            width: 80px;
            height: 80px;
            /* border: 2px solid red; /* Debug */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
        }
        
        #dz-in { top: 50%; left: 50%; }
        #dz-on { top: -10px; left: 50%; }
        #dz-under { top: 110%; left: 50%; }

        /* --- Level 2 Specifics --- */
        #level2-stage {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400"><rect width="800" height="400" fill="%23e2e8f0"/><rect x="100" y="200" width="300" height="100" fill="%23cbd5e1" stroke="%2364748b" stroke-width="4"/> <!-- Sofa --><rect x="500" y="220" width="200" height="80" fill="%2394a3b8" stroke="%23475569" stroke-width="4"/> <!-- Table --><rect x="550" y="150" width="100" height="70" fill="%23334155"/> <!-- TV --><text x="250" y="260" font-family="sans-serif" font-size="20" fill="%23475569">Sofa</text><text x="600" y="265" font-family="sans-serif" font-size="20" fill="%23475569">Table</text></svg>');
            background-size: cover;
            background-position: bottom;
        }

        .item {
            position: absolute;
            font-size: 3rem; /* Using emoji for simplicity */
            cursor: grab;
            user-select: none;
            z-index: 20;
        }
        
        .item:active { cursor: grabbing; }

        /* Level 2 Dropzones */
        .l2-dropzone {
            position: absolute;
            width: 100px;
            height: 100px;
            /* background: rgba(0,255,0,0.2); /* Debug */
            border-radius: 10px;
        }

        #dz-sofa-on { top: 140px; left: 200px; width: 200px;}
        #dz-table-under { top: 290px; left: 550px; }


        /* --- Controls (Word Bank / Options) --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .option-btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            background-color: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background-color: #eef2ff;
        }

        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- Footer / Feedback --- */
        #feedback-area {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            min-height: 24px;
        }

        .success-text { color: var(--success); }
        .error-text { color: var(--error); }

        .btn-primary {
            display: block;
            margin: 20px auto 0;
            padding: 10px 30px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        
        .btn-primary:hover { background-color: var(--primary-hover); }

        /* Hidden initially */
        .hidden { display: none !important; }

    </style>
</head>
<body>

<div id="game-container">
    <div id="game-header">
        <h1>Location Finder</h1>
        <div id="level-indicator" class="hidden">Level 1</div>
    </div>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen active">
        <h2>Choose a Level</h2>
        
        <button class="level-btn" onclick="startGame(1)">
            Level 1: Boxy Basics
            <div class="level-desc">Simple shapes, easy prepositions.</div>
        </button>
        
        <button class="level-btn" onclick="startGame(2)">
            Level 2: Living Room Logic
            <div class="level-desc">Complex scene, more vocabulary.</div>
        </button>
    </div>

    <!-- Gameplay Screen -->
    <div id="game-screen" class="screen">
        <div id="prompt" class="prompt-area">Loading...</div>
        
        <!-- Stage Area -->
        <div id="stage" class="stage">
            <!-- Level 1 Content -->
            <div id="level1-content" class="hidden" style="width: 100%; height: 100%; position: relative;">
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                    <div class="box" id="main-box">
                        <!-- Dropzones inside relative to box -->
                        <div id="dz-in" class="dropzone" data-target="in"></div>
                        <div id="dz-on" class="dropzone" data-target="on"></div>
                        <div id="dz-under" class="dropzone" data-target="under"></div>
                    </div>
                    <div id="drag-ball" class="ball" draggable="true"></div>
                </div>
            </div>

            <!-- Level 2 Content -->
            <div id="level2-content" class="hidden" style="width: 100%; height: 100%; position: relative;">
                <div id="dz-sofa-on" class="l2-dropzone" data-target="on-sofa"></div>
                <div id="dz-table-under" class="l2-dropzone" data-target="under-table"></div>
                
                <!-- Items to drag -->
                <div id="drag-cat" class="item" draggable="true" style="bottom: 10px; left: 10px;">🐈</div>
                <div id="drag-dog" class="item" draggable="true" style="bottom: 10px; left: 80px;">🐕</div>
            </div>
        </div>

        <!-- Controls Area -->
        <div id="controls" class="controls hidden">
            <!-- Buttons generated dynamically -->
        </div>

        <div id="feedback-area"></div>
        
        <button id="next-btn" class="btn-primary hidden" onclick="nextQuestion()">Next Question</button>
        <button id="menu-btn" class="btn-primary hidden" onclick="returnToMenu()">Main Menu</button>
    </div>
</div>

<script>
    // --- Game Data ---
    const prepositions = ["in", "on", "under", "behind", "in front of", "next to", "between"];

    const level1Data = {
        part1: [ // Drag and Drop
            { text: "Put the ball <b>in</b> the box.", target: "in", object: "drag-ball" },
            { text: "Put the ball <b>on</b> the box.", target: "on", object: "drag-ball" },
            { text: "Put the ball <b>under</b> the box.", target: "under", object: "drag-ball" }
        ],
        part2: [ // Fill in blank
            { setupClass: "pos-in", answer: "in", prompt: "The ball is <span class='blank'></span> the box." },
            { setupClass: "pos-on", answer: "on", prompt: "The ball is <span class='blank'></span> the box." },
            { setupClass: "pos-nextto", answer: "next to", prompt: "The ball is <span class='blank'></span> the box." },
            { setupClass: "pos-infront", answer: "in front of", prompt: "The ball is <span class='blank'></span> the box." }
        ]
    };

    const level2Data = {
        part1: [
            { text: "Put the cat <b>on</b> the sofa.", target: "on-sofa", object: "drag-cat" },
            { text: "Put the dog <b>under</b> the table.", target: "under-table", object: "drag-dog" }
        ],
        part2: [
            // Assuming static scene for Part 2 in Level 2 based on background
            { prompt: "There is a TV <span class='blank'></span> the table.", answer: "on" },
            { prompt: "The table is <span class='blank'></span> the sofa.", answer: "next to" } // simplified context
        ]
    };

    // --- State Variables ---
    let currentLevel = 1;
    let currentPart = 1; // 1 = Drag, 2 = Fill blank
    let currentQuestionIndex = 0;
    let currentData = null;
    let draggedElement = null;

    // --- DOM Elements ---
    const screens = {
        menu: document.getElementById('menu-screen'),
        game: document.getElementById('game-screen')
    };
    const ui = {
        prompt: document.getElementById('prompt'),
        levelIndicator: document.getElementById('level-indicator'),
        feedback: document.getElementById('feedback-area'),
        nextBtn: document.getElementById('next-btn'),
        menuBtn: document.getElementById('menu-btn'),
        controls: document.getElementById('controls'),
        l1Content: document.getElementById('level1-content'),
        l2Content: document.getElementById('level2-content'),
        ball: document.getElementById('drag-ball')
    };

    // --- Game Logic Functions ---

    function switchScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    function returnToMenu() {
        switchScreen('menu');
        ui.levelIndicator.classList.add('hidden');
        resetStage();
    }

    function startGame(level) {
        currentLevel = level;
        currentPart = 1;
        currentQuestionIndex = 0;
        
        ui.levelIndicator.innerText = `Level ${level}`;
        ui.levelIndicator.classList.remove('hidden');
        
        switchScreen('game');
        loadQuestion();
    }

    function resetStage() {
        ui.feedback.innerHTML = '';
        ui.nextBtn.classList.add('hidden');
        ui.menuBtn.classList.add('hidden');
        ui.controls.classList.add('hidden');
        ui.controls.innerHTML = '';
        
        // Reset Level 1 Ball
        ui.ball.className = 'ball'; // Remove positional classes
        ui.ball.style.top = '100px'; // Reset drag position
        ui.ball.style.left = '-100px';
        ui.ball.setAttribute('draggable', false);

        // Reset Level 2 Items
        document.querySelectorAll('.item').forEach(item => {
             item.setAttribute('draggable', false);
             // Reset to bottom row
             item.style.top = 'auto';
             item.style.bottom = '10px';
        });

        // Hide contents
        ui.l1Content.classList.add('hidden');
        ui.l2Content.classList.add('hidden');
    }

    function loadQuestion() {
        resetStage();
        
        const dataSet = currentLevel === 1 ? level1Data : level2Data;
        const partData = currentPart === 1 ? dataSet.part1 : dataSet.part2;

        if (currentQuestionIndex >= partData.length) {
            // Move to Part 2 or Finish
            if (currentPart === 1) {
                currentPart = 2;
                currentQuestionIndex = 0;
                loadQuestion();
            } else {
                finishLevel();
            }
            return;
        }

        currentData = partData[currentQuestionIndex];

        // Setup UI based on Level and Part
        if (currentLevel === 1) {
            ui.l1Content.classList.remove('hidden');
            if (currentPart === 1) setupDragTask();
            if (currentPart === 2) setupFillTask();
        } else {
            ui.l2Content.classList.remove('hidden');
            if (currentPart === 1) setupDragTaskLevel2();
            if (currentPart === 2) setupFillTaskLevel2();
        }
    }

    // --- Task Setup Functions ---

    function setupDragTask() {
        ui.prompt.innerHTML = currentData.text;
        
        const ball = document.getElementById(currentData.object);
        ball.setAttribute('draggable', true);
        
        // Reset position for dragging
        ball.style.top = '100px';
        ball.style.left = '-100px';
        
        // Activate relevant dropzone
        document.querySelectorAll('.dropzone').forEach(dz => dz.style.display = 'none');
        document.querySelector(`.dropzone[data-target="${currentData.target}"]`).style.display = 'block';
    }

    function setupDragTaskLevel2() {
        ui.prompt.innerHTML = currentData.text;
        
        const item = document.getElementById(currentData.object);
        item.setAttribute('draggable', true);
        
        // Ensure items are at bottom
        item.style.top = 'auto';
        item.style.bottom = '10px';

        document.querySelectorAll('.l2-dropzone').forEach(dz => dz.style.display = 'none');
        document.querySelector(`.l2-dropzone[data-target="${currentData.target}"]`).style.display = 'block';
    }

    function setupFillTask() {
        ui.prompt.innerHTML = currentData.prompt;
        
        // Set visual state
        ui.ball.className = `ball ${currentData.setupClass}`;
        // Remove inline styles from drag
        ui.ball.style.top = ''; 
        ui.ball.style.left = '';

        generateWordBank();
    }

    function setupFillTaskLevel2() {
         ui.prompt.innerHTML = currentData.prompt;
         
         // Static scene, just generate buttons
         generateWordBank();
    }

    function generateWordBank() {
        ui.controls.classList.remove('hidden');
        prepositions.forEach(prep => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = prep;
            btn.onclick = () => checkFillAnswer(prep, btn);
            ui.controls.appendChild(btn);
        });
    }

    // --- Interaction Logic ---

    function handleDragStart(e) {
        draggedElement = e.target;
        e.dataTransfer.setData('text/plain', e.target.id);
        setTimeout(() => e.target.style.opacity = '0.5', 0);
    }

    function handleDragEnd(e) {
        e.target.style.opacity = '1';
        draggedElement = null;
    }

    function handleDragOver(e) {
        e.preventDefault(); // Necessary to allow dropping
    }

    function handleDrop(e) {
        e.preventDefault();
        const dropzone = e.target.closest('.dropzone, .l2-dropzone');
        
        if (dropzone && currentPart === 1) {
            const targetId = dropzone.getAttribute('data-target');
            
            if (targetId === currentData.target) {
                // Correct Drop
                handleSuccess("Correctly placed!");
                
                // Snap to center of dropzone
                const rect = dropzone.getBoundingClientRect();
                const stageRect = document.getElementById('stage').getBoundingClientRect();
                
                // Basic visual snapping
                draggedElement.style.left = (rect.left - stageRect.left + rect.width/2 - draggedElement.offsetWidth/2) + 'px';
                draggedElement.style.top = (rect.top - stageRect.top + rect.height/2 - draggedElement.offsetHeight/2) + 'px';
                draggedElement.style.bottom = 'auto'; // Clear bottom if set (Level 2)
                
                draggedElement.setAttribute('draggable', false);
            } else {
                handleError("Try a different spot!");
            }
        }
    }

    function checkFillAnswer(selectedPrep, btnElement) {
        // Disable all buttons to prevent multiple clicks
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

        if (selectedPrep === currentData.answer) {
            btnElement.style.backgroundColor = 'var(--success)';
            btnElement.style.color = 'white';
            btnElement.style.borderColor = 'var(--success)';
            
            // Fill the blank visually
            const blank = document.querySelector('.blank');
            if(blank) {
                blank.innerText = selectedPrep;
                blank.style.borderBottom = 'none';
            }

            handleSuccess("Correct preposition!");
        } else {
            btnElement.style.backgroundColor = 'var(--error)';
            btnElement.style.color = 'white';
            btnElement.style.borderColor = 'var(--error)';
            handleError("Incorrect. Try again!");
            
            // Re-enable after delay
            setTimeout(() => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
                btnElement.style.backgroundColor = '';
                btnElement.style.color = '';
                btnElement.style.borderColor = '';
                ui.feedback.innerHTML = '';
            }, 1500);
        }
    }

    // --- Feedback & Progression ---

    function handleSuccess(msg) {
        ui.feedback.innerHTML = `<span class="success-text">✅ ${msg}</span>`;
        ui.nextBtn.classList.remove('hidden');
    }

    function handleError(msg) {
        ui.feedback.innerHTML = `<span class="error-text">❌ ${msg}</span>`;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    function finishLevel() {
        ui.prompt.innerHTML = "Level Complete! Great Job!";
        resetStage();
        ui.menuBtn.classList.remove('hidden');
        ui.l1Content.classList.add('hidden');
        ui.l2Content.classList.add('hidden');
    }

    // --- Event Listeners Setup ---
    document.addEventListener('DOMContentLoaded', () => {
        // Setup Draggables
        document.querySelectorAll('.ball, .item').forEach(item => {
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragend', handleDragEnd);
        });

        // Setup Dropzones (delegated to stage area)
        const stage = document.getElementById('stage');
        stage.addEventListener('dragover', handleDragOver);
        stage.addEventListener('drop', handleDrop);
    });

</script>

<script src="../touch-support.js"></script>
</body>
</html>
