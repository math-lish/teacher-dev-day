<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方位大挑戰 - Level 1 原型</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        #instruction {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .highlight { color: #e74c3c; font-size: 28px; text-decoration: underline;}
        
        /* 遊戲區域設定 */
        #game-area {
            width: 600px;
            height: 400px;
            background-color: white;
            border: 3px solid #bdc3c7;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 盒子設定 */
        #box {
            width: 120px;
            height: 120px;
            background-color: #d35400;
            border: 2px solid #a04000;
            position: absolute;
            left: 240px; /* 置中 (600 - 120)/2 */
            top: 180px;  /* 稍微偏下 */
            box-shadow: inset 0 -20px 0 rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* 球體設定 */
        #ball {
            width: 60px;
            height: 60px;
            background-color: #e74c3c;
            border-radius: 50%;
            position: absolute;
            left: 50px;
            top: 50px;
            cursor: grab;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.3);
            z-index: 20;
            transition: transform 0.1s;
        }
        #ball:active { cursor: grabbing; transform: scale(1.1); }

        /* 訊息與按鈕 */
        #message {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            height: 30px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* 預設隱藏，答對才顯示 */
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h1>方位大挑戰 (Preposition Master)</h1>
    <div id="instruction">Put the ball <span id="prep-word" class="highlight">on</span> the box.</div>

    <div id="game-area">
        <div id="box"></div>
        <div id="ball"></div>
    </div>

    <div id="message"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>

    <script>
        const ball = document.getElementById('ball');
        const box = document.getElementById('box');
        const gameArea = document.getElementById('game-area');
        const prepWordSpan = document.getElementById('prep-word');
        const messageDiv = document.getElementById('message');
        const nextBtn = document.getElementById('next-btn');

        // 題庫
        const prepositions = ['on', 'under', 'in', 'next to'];
        let currentPrep = '';

        // 拖曳相關變數
        let isDragging = false;
        let offsetX, offsetY;

        // 初始化遊戲
        function initGame() {
            // 隨機選一個方位
            currentPrep = prepositions[Math.floor(Math.random() * prepositions.length)];
            prepWordSpan.innerText = currentPrep;
            messageDiv.innerText = '';
            messageDiv.style.color = 'black';
            nextBtn.style.display = 'none';

            // 重置球的位置
            ball.style.left = '50px';
            ball.style.top = '50px';
            ball.style.opacity = '1'; // 重置透明度 (用於 'in' 的視覺效果)
        }

        // 滑鼠按下事件
        ball.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - ball.offsetLeft;
            offsetY = e.clientY - ball.offsetTop;
        });

        // 滑鼠移動事件
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                // 限制球體不要跑出遊戲區域
                let newX = e.clientX - offsetX;
                let newY = e.clientY - offsetY;
                
                // 邊界檢查
                newX = Math.max(0, Math.min(newX, gameArea.offsetWidth - ball.offsetWidth));
                newY = Math.max(0, Math.min(newY, gameArea.offsetHeight - ball.offsetHeight));

                ball.style.left = newX + 'px';
                ball.style.top = newY + 'px';
            }
        });

        // 滑鼠放開事件 (核心判斷邏輯)
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                checkPosition();
            }
        });

        function checkPosition() {
            // 取得球與盒子的位置資訊 (中心點)
            const ballRect = ball.getBoundingClientRect();
            const boxRect = box.getBoundingClientRect();

            const ballCenterX = ballRect.left + ballRect.width / 2;
            const ballCenterY = ballRect.top + ballRect.height / 2;
            const boxCenterX = boxRect.left + boxRect.width / 2;
            const boxCenterY = boxRect.top + boxRect.height / 2;

            let isCorrect = false;

            // 判斷邏輯 (給予一定的容錯空間)
            switch (currentPrep) {
                case 'on':
                    // 球在盒子上：X軸對齊，且球的底部接近盒子的頂部
                    if (Math.abs(ballCenterX - boxCenterX) < 60 && ballCenterY < boxRect.top && ballCenterY > boxRect.top - 60) {
                        isCorrect = true;
                    }
                    break;
                case 'under':
                    // 球在盒子下：X軸對齊，且球的頂部接近盒子的底部
                    if (Math.abs(ballCenterX - boxCenterX) < 60 && ballCenterY > boxRect.bottom && ballCenterY < boxRect.bottom + 60) {
                        isCorrect = true;
                    }
                    break;
                case 'in':
                    // 球在盒子裡：球的中心點完全在盒子內部
                    if (ballCenterX > boxRect.left + 20 && ballCenterX < boxRect.right - 20 && 
                        ballCenterY > boxRect.top + 20 && ballCenterY < boxRect.bottom - 20) {
                        isCorrect = true;
                        ball.style.opacity = '0.6'; // 半透明模擬掉進去的
