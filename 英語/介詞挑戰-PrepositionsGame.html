<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prepositions of Place Game</title>
<style>
  :root { --primary: #2196F3; --success: #4CAF50; --danger: #F44336; --bg: #f5f7fa; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 5px; text-align: center; color: #333; touch-action: manipulation; }
  
  /* Compact Header & Controls for Mobile */
  .header { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto 8px auto; padding: 8px 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  .header-title { font-weight: bold; font-size: 16px; }
  .score-board { font-weight: bold; font-size: 16px; color: var(--primary); }
  
  .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 8px; max-width: 600px; margin: 0 auto 8px auto; }
  .btn-nav { padding: 6px 10px; border: none; border-radius: 5px; background: #e0e0e0; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
  .btn-nav.active { background: var(--primary); color: white; }
  
  /* Game Area */
  .game-wrapper { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .instruction { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #444; }
  
  /* Scene (Compact Height) */
  .scene { position: relative; width: 100%; height: 180px; background: #e3f2fd; border-radius: 10px; margin-bottom: 12px; overflow: hidden; border: 2px solid #bbdefb; }
  
  /* Hit Zones */
  .hit-zone { position: absolute; border: 2px dashed transparent; border-radius: 10px; transition: 0.2s; z-index: 1; }
  .hit-zone.highlight { border-color: rgba(33, 150, 243, 0.5); background: rgba(33, 150, 243, 0.1); }
  
  /* Scene Objects */
  .anchor-obj { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 50px; z-index: 2; user-select: none; }
  #box-simple { width: 70px; height: 70px; background: #8D6E63; border-radius: 5px; left: 50%; top: 50%; transform: translate(-50%, -30%); box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); }
  
  /* Draggable Item */
  .draggable { position: absolute; font-size: 35px; z-index: 10; cursor: grab; touch-action: none; transition: transform 0.1s; user-select: none; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #ff5252, #c62828); border-radius: 50%; box-shadow: 2px 4px 6px rgba(0,0,0,0.3); }
  .draggable:active { cursor: grabbing; transform: scale(1.1); }
  .draggable.emoji-mode { background: none; box-shadow: none; font-size: 45px; width: auto; height: auto; }

  /* Unified Action Area */
  .action-area { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 10px; }
  
  /* Sentence Fill-in-the-blank */
  .sentence-wrapper { font-size: 16px; font-weight: bold; color: #333; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; }
  .sentence-wrapper input { padding: 6px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px; width: 100px; text-align: center; outline: none; font-weight: bold; color: var(--primary); }
  .sentence-wrapper input:focus { border-color: var(--primary); }

  /* Word Bank (Hints) */
  .word-bank { display: none; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; background: #f1f8e9; border: 1px dashed #8bc34a; border-radius: 8px; width: 100%; box-sizing: border-box; }
  .word-chip { padding: 6px 12px; background: white; border: 1px solid #8bc34a; border-radius: 15px; font-size: 14px; font-weight: bold; color: #33691e; cursor: pointer; box-shadow: 0 2px 3px rgba(0,0,0,0.05); }
  .word-chip:active { transform: scale(0.95); }
  
  /* Buttons */
  .btn-group { display: flex; gap: 10px; justify-content: center; }
  .btn-action { padding: 10px 20px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; background: var(--success); transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  .btn-hint { background: #FF9800; }
  .btn-action:hover { opacity: 0.9; }
  
  /* Feedback Panel */
  .feedback { margin-top: 10px; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; display: none; flex-direction: column; gap: 8px; align-items: center; }
  .feedback.correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: flex; }
  .feedback.wrong { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; display: flex; }
  .exp-text { font-size: 13px; font-weight: normal; margin-top: 2px; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-title">🎮 Prepositions</div>
    <div class="score-board">Score: <span id="score-display">0</span></div>
  </div>

  <div class="controls">
    <button class="btn-nav active" id="btn-lv1" onclick="setMode(1, currentStyle)">LV 1</button>
    <button class="btn-nav" id="btn-lv2" onclick="setMode(2, currentStyle)">LV 2</button>
    <div style="width: 2px; background:#ccc; margin: 0 2px;"></div>
    <button class="btn-nav active" id="btn-st1" onclick="setMode(currentLevel, 1)">Drag</button>
    <button class="btn-nav" id="btn-st2" onclick="setMode(currentLevel, 2)">Type</button>
  </div>

  <div class="game-wrapper">
    <div class="instruction" id="instruction">Loading...</div>
    
    <div class="scene" id="scene"></div>

    <div class="action-area" id="action-area">
      <div class="sentence-wrapper" id="sentence-wrapper" style="display:none;">
        <span id="sen-start"></span>
        <input type="text" id="type-input" autocomplete="off" autocorrect="off" autocapitalize="off">
        <span id="sen-end"></span>
      </div>

      <div class="word-bank" id="word-bank"></div>

      <div class="btn-group">
        <button class="btn-action btn-hint" id="btn-hint" style="display:none;" onclick="toggleHint()">💡 Hint</button>
        <button class="btn-action" id="btn-check" onclick="checkAnswer()">✔️ Check</button>
      </div>
    </div>

    <div class="feedback" id="feedback">
      <div id="feedback-msg"></div>
      <div class="exp-text" id="feedback-exp"></div>
      <button class="btn-action" style="background: var(--primary); padding: 8px 15px;" onclick="nextQuestion()">Next ➡️</button>
    </div>
  </div>

  <script>
    // --- 遊戲資料庫 (Game Data) ---
    // 已修正：將 Level 2 中的 Table 改為 Chair
    const gameData = {
      level1: {
        anchors: `<div id="box-simple" class="anchor-obj"></div>`,
        draggables: `<div class="draggable" id="player-item" style="left: 10px; bottom: 10px;"></div>`,
        zones: {
          'on': { left: '40%', top: '10%', width: '20%', height: '30%' },
          'under': { left: '40%', top: '75%', width: '20%', height: '25%' },
          'next to': { left: '15%', top: '35%', width: '20%', height: '30%' },
          'above': { left: '40%', top: '-5%', width: '20%', height: '15%' }
        },
        questions: [
          { prep: "on", text: "Put the ball ON the box.", sentence: ["The ball is", "the box."], exp: "'On' means touching the top surface." },
          { prep: "under", text: "Put the ball UNDER the box.", sentence: ["The ball is", "the box."], exp: "'Under' means directly below." },
          { prep: "next to", text: "Put the ball NEXT TO the box.", sentence: ["The ball is", "the box."], exp: "'Next to' means at the side." }
        ]
      },
      level2: {
        anchors: `
          <div class="anchor-obj" style="left: 10%; top: 40%; font-size: 60px;">🛋️</div> 
          <div class="anchor-obj" style="left: 55%; top: 45%; font-size: 55px;">🪑</div> 
          <div class="anchor-obj" style="left: 80%; top: 20%; font-size: 40px;">📺</div> 
        `,
        zones: {
          'on-sofa': { left: '15%', top: '25%', width: '25%', height: '30%' },
          'under-chair': { left: '55%', top: '75%', width: '25%', height: '25%' },
          'in-front-tv': { left: '75%', top: '45%', width: '20%', height: '30%' }
        },
        questions: [
          { prep: "on", zoneId: "on-sofa", item: "🐈", text: "Put the cat ON the sofa.", sentence: ["The cat is", "the sofa."], exp: "Resting on top of the sofa." },
          { prep: "under", zoneId: "under-chair", item: "🐕", text: "Put the dog UNDER the chair.", sentence: ["The dog is", "the chair."], exp: "On the floor beneath the chair." },
          { prep: "in front of", zoneId: "in-front-tv", item: "📦", text: "Put the box IN FRONT OF the TV.", sentence: ["The box is", "the TV."], exp: "Closer to you than the TV." }
        ]
      }
    };

    // --- 狀態管理 ---
    let currentLevel = 1;
    let currentStyle = 1;
    let currentQIndex = 0;
    let score = 0;
    let questionsPool = [];
    let isAnswerChecked = false;
    let currentItem = null;

    try {
        const savedScore = localStorage.getItem('prepGameScore');
        if (savedScore) score = parseInt(savedScore);
    } catch (e) { console.log("LocalStorage not available."); }
    document.getElementById('score-display').innerText = score;

    // --- 初始化系統 ---
    function setMode(lv, style) {
        currentLevel = lv;
        currentStyle = style;
        currentQIndex = 0;
        
        document.getElementById('btn-lv1').classList.toggle('active', lv === 1);
        document.getElementById('btn-lv2').classList.toggle('active', lv === 2);
        document.getElementById('btn-st1').classList.toggle('active', style === 1);
        document.getElementById('btn-st2').classList.toggle('active', style === 2);
        
        questionsPool = [...gameData[`level${lv}`].questions];
        questionsPool.sort(() => Math.random() - 0.5);
        loadQuestion();
    }

    function loadQuestion() {
        isAnswerChecked = false;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-check').style.display = 'block';
        
        if (currentQIndex >= questionsPool.length) currentQIndex = 0;
        
        const q = questionsPool[currentQIndex];
        const scene = document.getElementById('scene');
        const levelData = gameData[`level${currentLevel}`];
        
        scene.innerHTML = levelData.anchors;
        for (const [key, rect] of Object.entries(levelData.zones)) {
            scene.innerHTML += `<div class="hit-zone" id="zone-${key}" style="left:${rect.left}; top:${rect.top}; width:${rect.width}; height:${rect.height};"></div>`;
        }

        const instruction = document.getElementById('instruction');
        const sentenceWrapper = document.getElementById('sentence-wrapper');
        const btnHint = document.getElementById('btn-hint');
        const wordBank = document.getElementById('word-bank');
        
        wordBank.style.display = 'none';
        wordBank.innerHTML = '';

        if (currentStyle === 1) {
            sentenceWrapper.style.display = 'none';
            btnHint.style.display = 'none';
            instruction.innerHTML = `【Drag & Drop】<br><span style="color:var(--primary)">${q.text}</span>`;
            
            let dragger = levelData.draggables;
            if (currentLevel === 2) {
                 dragger = `<div class="draggable emoji-mode" id="player-item" style="left: 10px; bottom: 10px;">${q.item}</div>`;
            }
            scene.innerHTML += dragger;
            initDraggable();
        } else {
            sentenceWrapper.style.display = 'flex';
            btnHint.style.display = 'block';
            document.getElementById('type-input').value = "";
            instruction.innerHTML = `【Fill in the Blank】`;
            
            document.getElementById('sen-start').innerText = q.sentence[0];
            document.getElementById('sen-end').innerText = q.sentence[1];
            
            let targetZoneId = currentLevel === 1 ? q.prep : q.zoneId;
            let zoneStyle = levelData.zones[targetZoneId];
            
            let fixedItem = currentLevel === 1 
                ? `<div class="draggable" style="left:${zoneStyle.left}; top:${zoneStyle.top}; margin-left:15px; cursor:default;"></div>`
                : `<div class="draggable emoji-mode" style="left:${zoneStyle.left}; top:${zoneStyle.top}; cursor:default;">${q.item}</div>`;
            scene.innerHTML += fixedItem;

            const uniquePreps = [...new Set(questionsPool.map(q => q.prep))].sort();
            uniquePreps.forEach(word => {
                wordBank.innerHTML += `<div class="word-chip" onclick="fillInput('${word}')">${word}</div>`;
            });
        }
    }

    function toggleHint() {
        const wb = document.getElementById('word-bank');
        wb.style.display = wb.style.display === 'none' ? 'flex' : 'none';
    }

    function fillInput(word) {
        document.getElementById('type-input').value = word;
    }

    function initDraggable() {
        currentItem = document.getElementById('player-item');
        if (!currentItem) return;

        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        currentItem.addEventListener('pointerdown', (e) => {
            if (isAnswerChecked) return;
            isDragging = true;
            currentItem.setPointerCapture(e.pointerId);
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = currentItem.offsetLeft;
            initialTop = currentItem.offsetTop;
            currentItem.style.zIndex = "100";
        });

        currentItem.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            currentItem.style.left = `${initialLeft + dx}px`;
            currentItem.style.top = `${initialTop + dy}px`;
             
            document.querySelectorAll('.hit-zone').forEach(zone => {
                if (isOverlapping(currentItem, zone)) zone.classList.add('highlight');
                else zone.classList.remove('highlight');
            });
        });

        currentItem.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            currentItem.releasePointerCapture(e.pointerId);
            currentItem.style.zIndex = "10";
        });
    }

    function isOverlapping(el1, el2) {
        const rect1 = el1.getBoundingClientRect();
        const rect2 = el2.getBoundingClientRect();
        const tolerance = 15;
        return !(rect1.right - tolerance < rect2.left || 
                 rect1.left + tolerance > rect2.right || 
                 rect1.bottom - tolerance < rect2.top || 
                 rect1.top + tolerance > rect2.bottom);
    }

    function checkAnswer() {
        if (isAnswerChecked) return;
        if (currentStyle === 1) {
            checkDragAnswer();
        } else {
            checkTypeAnswer();
        }
    }

    function showFeedback(isCorrect, explanation) {
        isAnswerChecked = true;
        document.getElementById('btn-check').style.display = 'none';
        const fb = document.getElementById('feedback');
        const fbMsg = document.getElementById('feedback-msg');
        const fbExp = document.getElementById('feedback-exp');
        
        fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
        fbMsg.innerText = isCorrect ? "🎉 Correct! 答對了！" : "❌ Incorrect. 答錯囉！";
        fbExp.innerText = explanation;
        fb.style.display = 'flex';
        
        if (isCorrect) {
            score += 10;
            document.getElementById('score-display').innerText = score;
            try { localStorage.setItem('prepGameScore', score); } catch(e){}
        }
    }

    function checkDragAnswer() {
        const q = questionsPool[currentQIndex];
        const targetZoneId = currentLevel === 1 ? q.prep : q.zoneId;
        const targetZone = document.getElementById(`zone-${targetZoneId}`);
        
        if (isOverlapping(currentItem, targetZone)) {
            currentItem.style.left = targetZone.style.left;
            currentItem.style.top = targetZone.style.top;
            showFeedback(true, q.exp);
            document.querySelectorAll('.hit-zone').forEach(z => z.classList.remove('highlight'));
        } else {
            currentItem.style.left = "10px";
            currentItem.style.top = "10px";
            const instruction = document.getElementById('instruction');
            instruction.innerHTML = `<span style="color:var(--danger)">Try again! 先把物品拖到正確位置再按 Check</span><br>${q.text}`;
            document.querySelectorAll('.hit-zone').forEach(z => z.classList.remove('highlight'));
        }
    }

    function checkTypeAnswer() {
        const q = questionsPool[currentQIndex];
        const userInput = document.getElementById('type-input').value.trim().toLowerCase();
        if (userInput === "") return;
        
        let correctAnswers = [q.prep];
        if (q.prep === "next to") correctAnswers.push("beside");
        if (q.prep === "under") correctAnswers.push("below");
        
        if (correctAnswers.includes(userInput)) {
            showFeedback(true, q.exp);
        } else {
            showFeedback(false, `The correct answer is "${q.prep}". ${q.exp}`);
        }
    }

    function nextQuestion() {
        currentQIndex++;
        loadQuestion();
    }

    document.getElementById('type-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    setMode(1, 1);
  </script>
<script src="../touch-support.js"></script>
</body>
</html>
