<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛漫畫風：Reported Speech 挑戰</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #555;
        }
        #game-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 4px solid #ffd1dc;
        }
        h1 {
            color: #ff8b94;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .comic-scene {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f0f8ff;
            border-radius: 15px;
            border: 2px dashed #add8e6;
        }
        #character {
            font-size: 60px;
            margin-right: 15px;
        }
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: .4em;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 2px solid #ffb6c1;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-right-color: #ffb6c1;
            border-left: 0;
            margin-top: -10px;
            margin-left: -12px;
        }
        #progress {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .drop-zone {
            width: 100%;
            height: 80px;
            border: 3px dashed #ffb6c1;
            border-radius: 15px;
            background-color: #fff0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            font-size: 16px;
            color: #ff69b4;
            transition: all 0.3s;
        }
        .drop-zone.hovered {
            background-color: #ffe4e1;
            border-color: #ff1493;
            transform: scale(1.02);
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            background-color: #e0ffff;
            border: 2px solid #87cefa;
            border-radius: 10px;
            padding: 12px;
            cursor: grab;
            font-size: 16px;
            transition: all 0.2s;
        }
        .option:active {
            cursor: grabbing;
        }
        .option:hover {
            background-color: #afeeee;
            transform: translateY(-2px);
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }
        .correct { color: #32cd32; }
        .incorrect { color: #ff4500; }
        .explanation {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            display: none;
            background: #fffacd;
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background-color: #ff8b94;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            font-weight: bold;
        }
        button:hover {
            background-color: #ff7681;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>✨ 可愛漫畫風：Reported Speech 挑戰 ✨</h1>
    <div id="progress">題目 1 / 10</div>
    
    <div class="comic-scene">
        <div id="character">👧</div>
        <div class="speech-bubble" id="direct-speech">"I like apples."</div>
    </div>

    <p style="font-size: 14px; color: #888;">💡 請將下方正確的句子「拖曳」到這個虛線框框裡！</p>
    
    <div class="drop-zone" id="drop-zone">
        把正確答案拖來這裡
    </div>

    <div class="options-container" id="options">
        </div>

    <div id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    
    <button id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
</div>

<script>
    const questions = [
        {
            char: "👧", text: "Mary 說：\"I like apples.\"",
            options: [
                "Mary said she liked apples.",
                "Mary said she likes apples.",
                "Mary said I liked apples.",
                "Mary said she had liked apples."
            ],
            correct: 0,
            rationale: "太棒了！當主要動詞是 said (過去式) 時，引語內的 like (現在式) 需改為 liked (過去式)，且 I 變成 she。"
        },
        {
            char: "👦🎾", text: "John 說：\"I am playing tennis now.\"",
            options: [
                "John said he is playing tennis now.",
                "John said he was playing tennis now.",
                "John said he was playing tennis then.",
                "John said I was playing tennis then."
            ],
            correct: 2,
            rationale: "答對了！現在進行式 (am playing) 需改為過去進行式 (was playing)，且 now 要改為 then。"
        },
        {
            char: "🧒🧒", text: "孩子們說：\"We went to the zoo yesterday.\"",
            options: [
                "They said they went to the zoo yesterday.",
                "They said they had gone to the zoo yesterday.",
                "They said we went to the zoo the day before.",
                "They said they had gone to the zoo the day before."
            ],
            correct: 3,
            rationale: "非常厲害！過去式 (went) 要退一步變過去完成式 (had gone)，yesterday 也要改成 the day before。"
        },
        {
            char: "👩‍🎓", text: "女學生說：\"I have finished my homework.\"",
            options: [
                "She said she has finished her homework.",
                "She said she had finished her homework.",
                "She said I had finished my homework.",
                "She said she finished her homework."
            ],
            correct: 1,
            rationale: "正確！現在完成式 (have finished) 轉換時要退一步變成過去完成式 (had finished)。"
        },
        {
            char: "📱👦", text: "男孩告訴我：\"I will call you tomorrow.\"",
            options: [
                "He told me he would call me the next day.",
                "He told me he will call me tomorrow.",
                "He told me he would call me tomorrow.",
                "He told me he will call me the next day."
            ],
            correct: 0,
            rationale: "完美！助動詞 will 要變成過去式 would，而 tomorrow 要換成 the next day。"
        },
        {
            char: "🛟👦", text: "小男孩說：\"I can swim.\"",
            options: [
                "The boy said he can swim.",
                "The boy said I could swim.",
                "The boy said he had swum.",
                "The boy said he could swim."
            ],
            correct: 3,
            rationale: "答對了！情態助動詞 can 在間接引語中需退一步改為過去式 could。"
        },
        {
            char: "📦👨‍👩‍👧", text: "鄰居們說：\"We are going to move.\"",
            options: [
                "Our neighbors said they were going to move.",
                "Our neighbors said we were going to move.",
                "Our neighbors said they are going to move.",
                "Our neighbors said they had been going to move."
            ],
            correct: 0,
            rationale: "好極了！在 'be going to' 的句型中，只需把 be 動詞 (are) 改成過去式 (were)，主詞 we 變 they。"
        },
        {
            char: "🙇‍♂️📝", text: "學生說：\"I don't know the answer.\"",
            options: [
                "The student said he doesn't know the answer.",
                "The student said he didn't know the answer.",
                "The student said he hasn't known the answer.",
                "The student said I didn't know the answer."
            ],
            correct: 1,
            rationale: "太棒了！現在簡單式的否定 (don't know) 需退一步改為過去簡單式的否定 (didn't know)。"
        },
        {
            char: "☔👧", text: "女孩說：\"It was raining all day.\"",
            options: [
                "She said it was raining all day.",
                "She said it has been raining all day.",
                "She said it had been raining all day.",
                "She said it had rained all day."
            ],
            correct: 2,
            rationale: "非常準確！過去進行式 (was raining) 通常需再退一步改為過去完成進行式 (had been raining)。"
        },
        {
            char: "🎬👦", text: "男孩說：\"I haven't seen this movie.\"",
            options: [
                "He said he hasn't seen this movie.",
                "He said he hadn't seen this movie.",
                "He said he didn't see that movie.",
                "He said he hadn't seen that movie."
            ],
            correct: 3,
            rationale: "恭喜全對！現在完成式否定 (haven't seen) 變過去完成式 (hadn't seen)，指示代名詞 this 也要改成 that。"
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const characterEl = document.getElementById('character');
    const directSpeechEl = document.getElementById('direct-speech');
    const optionsEl = document.getElementById('options');
    const dropZone = document.getElementById('drop-zone');
    const feedbackEl = document.getElementById('feedback');
    const explanationEl = document.getElementById('explanation');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');

    function shuffle(array) {
        let currentIndex = array.length,  randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [
                array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        characterEl.textContent = q.char;
        directSpeechEl.textContent = q.text;
        progressEl.textContent = `題目 ${currentQuestionIndex + 1} / ${questions.length}`;
        
        dropZone.textContent = "把正確答案拖來這裡";
        dropZone.style.backgroundColor = "#fff0f5";
        dropZone.style.borderColor = "#ffb6c1";
        feedbackEl.textContent = "";
        explanationEl.style.display = "none";
        nextBtn.style.display = "none";
        
        optionsEl.innerHTML = '';
        
        // Create an array of options with their original index to track the correct one
        let optionsWithIndex = q.options.map((opt, index) => ({ text: opt, index: index }));
        shuffle(optionsWithIndex);

        optionsWithIndex.forEach((opt) => {
            const div = document.createElement('div');
            div.classList.add('option');
            div.textContent = opt.text;
            div.draggable = true;
            div.dataset.index = opt.index;
            
            div.addEventListener('dragstart', dragStart);
            optionsEl.appendChild(div);
        });
    }

    // Drag and Drop Logic
    let draggedItem = null;

    function dragStart(e) {
        draggedItem = e.target;
        e.dataTransfer.effectAllowed = 'move';
    }

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault(); // 允許放下
        dropZone.classList.add('hovered');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('hovered');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('hovered');
        
        if (draggedItem && nextBtn.style.display === "none") { // 如果還沒答對
            const selectedIndex = parseInt(draggedItem.dataset.index);
            const correctIndex = questions[currentQuestionIndex].correct;

            if (selectedIndex === correctIndex) {
                // 答對了
                dropZone.textContent = draggedItem.textContent;
                dropZone.style.backgroundColor = "#e0ffe0";
                dropZone.style.borderColor = "#32cd32";
                feedbackEl.innerHTML = "✨ 答對了！ ✨";
                feedbackEl.className = "correct";
                explanationEl.textContent = questions[currentQuestionIndex].rationale;
                explanationEl.style.display = "block";
                nextBtn.style.display = "inline-block";
                
                // 隱藏選項區
                optionsEl.innerHTML = '';
                if(currentQuestionIndex === 0 && score === 0) score++; // Simple scoring
            } else {
                // 答錯了
                feedbackEl.innerHTML = "❌ 不太對喔，再試試看把其他選項拖進來！";
                feedbackEl.className = "incorrect";
                // 產生搖晃動畫提示
                draggedItem.style.transform = "translateX(5px)";
                setTimeout(() => draggedItem.style.transform = "translateX(-5px)", 100);
                setTimeout(() => draggedItem.style.transform = "translateX(0)", 200);
            }
        }
    });

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            // 遊戲結束
            document.querySelector('.comic-scene').style.display = 'none';
            document.querySelector('.options-container').style.display = 'none';
            dropZone.style.display = 'none';
            explanationEl.style.display = 'none';
            nextBtn.style.display = 'none';
            document.querySelector('p').style.display = 'none';
            
            progressEl.textContent = "遊戲完成！";
            feedbackEl.innerHTML = `🎉 恭喜你完成所有挑戰！你現在是 Reported Speech 大師了！ 🎉`;
            feedbackEl.style.fontSize = "20px";
            feedbackEl.style.color = "#ff69b4";
            
            const restartBtn = document.createElement('button');
            restartBtn.textContent = "再玩一次";
            restartBtn.onclick = () => location.reload();
            document.getElementById('game-container').appendChild(restartBtn);
            restartBtn.style.display = "inline-block";
        }
    }

    // 初始化遊戲
    loadQuestion();

</script>
<script src="../touch-support.js"></script>
</body>
</html>
