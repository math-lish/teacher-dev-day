<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Preposition Master | 介係詞大挑戰</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #F39C12;
            --success-color: #2ECC71;
            --error-color: #E74C3C;
            --bg-color: #F4F7F6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 標題與計分板 */
        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* 遊戲主要區塊 */
        .game-wrapper {
            background: white;
            width: 90%;
            max-width: 700px;
            margin: 20px auto;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level-title {
            color: var(--secondary-color);
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .instruction {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            min-height: 30px;
        }

        /* 遊戲場景（圖片區域） */
        .scene {
            position: relative;
            width: 100%;
            height: 350px;
            background-color: #E8ECEF;
            border: 2px solid #D1D8DD;
            border-radius: 10px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            touch-action: none; /* 防止手機拖拉時捲動頁面 */
        }

        /* 第一關：簡單物件 */
        .simple-box {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #8E44AD;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            z-index: 2;
        }

        /* 拖拉的球體 */
        .ball {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 15px 15px, #FF5F6D, #FFC371);
            border-radius: 50%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            z-index: 10;
            cursor: grab;
        }

        .ball:active { cursor: grabbing; }

        /* 放置感應區 (僅在拖曳時用於邏輯判斷，可設為透明) */
        .drop-zone {
            position: absolute;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            /* 測試時可解除註解查看感應區 */
            /* border: 2px dashed rgba(0,0,0,0.3); */ 
            z-index: 1;
        }

        /* 選擇題按鈕區域 */
        .options-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        .btn-option {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-option:hover { background-color: #357ABD; }
        .btn-option:active { transform: scale(0.95); }

        /* 回饋訊息 */
        .feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 30px;
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>Preposition Master 🏆</h1>
        <div class="stats-container">
            <div>Level: <span id="ui-level">1</span></div>
            <div>Score: <span id="ui-score">0</span></div>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="level-title" id="ui-level-title">Level 1: Basic Shapes</div>
        <div class="instruction" id="ui-instruction">Loading...</div>
        
        <div class="scene" id="game-scene">
            </div>

        <div class="options-container hidden" id="options-area">
            </div>

        <div class="feedback" id="ui-feedback"></div>
    </div>

<script>
    // --- 遊戲數據與狀態管理 ---
    const GAME_STATE = {
        level: 1,
        score: parseInt(localStorage.getItem('prepGameScore')) || 0,
        mode: 1, // 1: Drag & Drop (拖放), 2: Fill in the blank (選擇填空)
        targetPrep: '',
        isDragging: false
    };

    // 定義關卡內容與座標 (x, y 百分比)
    const LEVELS_DATA = {
        1: {
            title: "Level 1: Simple Box",
            bgImage: "", // 簡單關卡不使用背景圖，使用 CSS 方塊
            prepositions: ["on", "under", "in front of", "behind", "next to"],
            coords: {
                "on": { x: 50, y: 30, z: 3 },
                "under": { x: 50, y: 75, z: 1 },
                "in front of": { x: 50, y: 65, z: 15 },
                "behind": { x: 60, y: 40, z: 1 },
                "next to": { x: 75, y: 50, z: 3 }
            }
        },
        2: {
            title: "Level 2: Living Room",
            // 這裡請替換為你的第二張圖片的 URL
            bgImage: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&q=80&w=800", 
            prepositions: ["on the sofa", "under the table", "next to the lamp", "between the dog and cat", "behind the TV"],
            coords: {
                "on the sofa": { x: 30, y: 50, z: 5 },
                "under the table": { x: 70, y: 80, z: 5 },
                "next to the lamp": { x: 15, y: 40, z: 5 },
                "between the dog and cat": { x: 50, y: 85, z: 5 },
                "behind the TV": { x: 85, y: 45, z: 1 }
            }
        }
    };

    // --- DOM 元素綁定 ---
    const uiLevel = document.getElementById('ui-level');
    const uiScore = document.getElementById('ui-score');
    const uiLevelTitle = document.getElementById('ui-level-title');
    const uiInstruction = document.getElementById('ui-instruction');
    const gameScene = document.getElementById('game-scene');
    const optionsArea = document.getElementById('options-area');
    const uiFeedback = document.getElementById('ui-feedback');

    // --- 初始化遊戲 ---
    function initGame() {
        updateStats();
        startRound();
    }

    function updateStats() {
        uiLevel.innerText = GAME_STATE.level;
        uiScore.innerText = GAME_STATE.score;
        localStorage.setItem('prepGameScore', GAME_STATE.score);
    }

    // --- 開始新回合 ---
    function startRound() {
        const levelData = LEVELS_DATA[GAME_STATE.level];
        
        // 清理場景與狀態
        gameScene.innerHTML = '';
        optionsArea.innerHTML = '';
        optionsArea.classList.add('hidden');
        uiFeedback.innerText = '';
        uiLevelTitle.innerText = levelData.title;

        // 設置背景 (Level 1 用 CSS 方塊，Level 2 用背景圖)
        if (GAME_STATE.level === 1) {
            gameScene.style.backgroundImage = 'none';
            const box = document.createElement('div');
            box.className = 'simple-box';
            box.innerText = 'BOX';
            gameScene.appendChild(box);
        } else {
            gameScene.style.backgroundImage = `url('${levelData.bgImage}')`;
        }

        // 隨機決定玩法 (1 或 2) 與目標介係詞
        GAME_STATE.mode = Math.random() > 0.5 ? 1 : 2;
        const preps = levelData.prepositions;
        GAME_STATE.targetPrep = preps[Math.floor(Math.random() * preps.length)];

        if (GAME_STATE.mode === 1) {
            setupDragMode(levelData);
        } else {
            setupFillMode(levelData);
        }
    }

    // --- 玩法一：拖放模式 (Drag & Drop) ---
    function setupDragMode(levelData) {
        uiInstruction.innerHTML = `Action: Drag the ball <b>${GAME_STATE.targetPrep}</b>.`;
        
        // 建立可拖拽的球
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.id = 'player-ball';
        ball.style.left = '10%';
        ball.style.top = '10%';
        gameScene.appendChild(ball);

        // 設置隱形目標區域
        const targetPos = levelData.coords[GAME_STATE.targetPrep];
        const dropZone = document.createElement('div');
        dropZone.className = 'drop-zone';
        dropZone.style.left = targetPos.x + '%';
        dropZone.style.top = targetPos.y + '%';
        gameScene.appendChild(dropZone);

        enableDragAndDrop(ball, dropZone, targetPos);
    }

    // --- 玩法二：選擇填空模式 ---
    function setupFillMode(levelData) {
        uiInstruction.innerHTML = `Question: Where is the ball?`;
        
        // 將球固定在目標位置
        const targetPos = levelData.coords[GAME_STATE.targetPrep];
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.style.left = `calc(${targetPos.x}% - 25px)`; // 修正置中
        ball.style.top = `calc(${targetPos.y}% - 25px)`;
        ball.style.zIndex = targetPos.z;
        gameScene.appendChild(ball);

        // 顯示選項按鈕
        optionsArea.classList.remove('hidden');
        // 隨機打亂選項
        const shuffledPreps = [...levelData.prepositions].sort(() => 0.5 - Math.random());
        
        shuffledPreps.forEach(prep => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = prep;
            btn.onclick = () => checkAnswer(prep);
            optionsArea.appendChild(btn);
        });
    }

    // --- 處理拖放邏輯 (兼容電腦與手機) ---
    function enableDragAndDrop(ball, dropZone, targetPos) {
        let offsetX, offsetY;

        const moveAt = (pageX, pageY) => {
            const rect = gameScene.getBoundingClientRect();
            let newLeft = pageX - rect.left - offsetX;
            let newTop = pageY - rect.top - offsetY;

            // 邊界限制
            newLeft = Math.max(0, Math.min(newLeft, rect.width - ball.offsetWidth));
            newTop = Math.max(0, Math.min(newTop, rect.height - ball.offsetHeight));

            ball.style.left = newLeft + 'px';
            ball.style.top = newTop + 'px';
        };

        const onPointerDown = (e) => {
            e.preventDefault();
            GAME_STATE.isDragging = true;
            ball.style.zIndex = 1000;
            
            const rect = ball.getBoundingClientRect();
            // 兼容 Mouse Event 與 Touch Event
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;

            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('touchmove', onPointerMove, { passive: false });
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchend', onPointerUp);
        };

        const onPointerMove = (e) => {
            if (!GAME_STATE.isDragging) return;
            e.preventDefault();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            moveAt(clientX, clientY);
        };

        const onPointerUp = () => {
            GAME_STATE.isDragging = false;
            document.removeEventListener('mousemove', onPointerMove);
            document.removeEventListener('touchmove', onPointerMove);
            document.removeEventListener('mouseup', onPointerUp);
            document.removeEventListener('touchend', onPointerUp);

            // 檢查是否放置在正確區域內
            const ballRect = ball.getBoundingClientRect();
            const zoneRect = dropZone.getBoundingClientRect();
            
            // 計算中心點距離
            const ballCenterX = ballRect.left + ballRect.width / 2;
            const ballCenterY = ballRect.top + ballRect.height / 2;
            const zoneCenterX = zoneRect.left + zoneRect.width / 2;
            const zoneCenterY = zoneRect.top + zoneRect.height / 2;

            const distance = Math.hypot(ballCenterX - zoneCenterX, ballCenterY - zoneCenterY);

            if (distance < 50) { // 容錯半徑 50px
                ball.style.left = `calc(${targetPos.x}% - 25px)`;
                ball.style.top = `calc(${targetPos.y}% - 25px)`;
                ball.style.zIndex = targetPos.z;
                checkAnswer(GAME_STATE.targetPrep);
            } else {
                uiFeedback.innerText = "Try moving it closer! 📍";
                uiFeedback.style.color = "var(--error-color)";
            }
        };

        ball.addEventListener('mousedown', onPointerDown);
        ball.addEventListener('touchstart', onPointerDown, { passive: false });
        
        // 為了防止原生的圖片/物件拖拽干擾
        ball.ondragstart = () => false;
    }

    // --- 答案驗證與過關邏輯 ---
    function checkAnswer(userAnswer) {
        if (userAnswer === GAME_STATE.targetPrep) {
            uiFeedback.innerText = "Excellent! 🎉";
            uiFeedback.style.color = "var(--success-color)";
            GAME_STATE.score += 10;
            updateStats();

            // 判斷升級邏輯 (每 50 分升一級)
            if (GAME_STATE.score > 0 && GAME_STATE.score % 50 === 0 && GAME_STATE.level === 1) {
                setTimeout(() => {
                    alert("Congratulations! Unlocked Level 2: Living Room! 🛋️");
                    GAME_STATE.level = 2;
                    startRound();
                }, 1000);
            } else {
                setTimeout(startRound, 1200);
            }
        } else {
            uiFeedback.innerText = "Oops! Try again. ❌";
            uiFeedback.style.color = "var(--error-color)";
        }
    }

    // 啟動遊戲
    window.onload = initGame;
</script>

<script src="../touch-support.js"></script>
</body>
</html>
