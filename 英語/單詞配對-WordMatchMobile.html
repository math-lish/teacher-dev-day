<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Match Mobile</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 防止遊戲時頁面晃動 */
        }

        /* 頂部狀態欄 */
        .status-bar {
            background: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .stat-item { font-size: 1.1rem; font-weight: bold; }
        #timer { color: var(--error); }
        #score { color: var(--primary); }

        /* 單詞拖拽區（橫向滾動） */
        .word-pool {
            background: #e9ecef;
            padding: 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto; /* 手機端橫向滑動選擇單詞 */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            border-bottom: 2px solid #dee2e6;
        }

        .word-card {
            background: white;
            padding: 12px 20px;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            touch-action: none; /* 重要：防止觸控干擾 */
            user-select: none;
            font-weight: 600;
            color: #333;
            border: 2px solid transparent;
            display: inline-block;
        }

        .word-card.dragging { opacity: 0.4; }

        /* 圖片放置區（格狀滾動） */
        .game-board {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機端一行兩列 */
            gap: 15px;
            padding-bottom: 80px;
        }

        .drop-zone {
            background: white;
            aspect-ratio: 1/1;
            border-radius: 15px;
            border: 2px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .drop-zone .emoji { font-size: 3rem; margin-bottom: 5px; }
        .drop-zone.hover { background: #e3f2fd; border-color: var(--primary); }
        .drop-zone.correct { background: #e8f5e9; border-color: var(--success); border-style: solid; }
        
        .matched-label {
            color: var(--success);
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 控制按鈕 */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .btn-main {
            padding: 12px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(74,144,226,0.4);
        }

        /* 結算畫面 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="stat-item">⏳ <span id="timer">60</span>s</div>
    <div class="stat-item">🎯 <span id="score">0</span>/10</div>
</div>

<div class="word-pool" id="wordPool">
    </div>

<div class="game-board" id="gameBoard">
    </div>

<div class="controls">
    <button class="btn-main" onclick="startGame()" id="startBtn">Start Game</button>
</div>

<div class="modal" id="resultModal">
    <h1 id="resultTitle">Game Over</h1>
    <p id="resultScore" style="font-size: 1.5rem;"></p>
    <button class="btn-main" onclick="location.reload()">Try Again</button>
</div>

<script>
    const data = [
        { id: 1, word: 'Apple', img: '🍎' },
        { id: 2, word: 'Dog', img: '🐶' },
        { id: 3, word: 'Car', img: '🚗' },
        { id: 4, word: 'Book', img: '📖' },
        { id: 5, word: 'Fish', img: '🐟' },
        { id: 6, word: 'Sun', img: '☀️' },
        { id: 7, word: 'Bird', img: '🐦' },
        { id: 8, word: 'Tree', img: '🌳' },
        { id: 9, word: 'Cake', img: '🍰' },
        { id: 10, word: 'Moon', img: '🌙' }
    ];

    let score = 0;
    let timeLeft = 60;
    let timerId = null;

    function init() {
        const pool = document.getElementById('wordPool');
        const board = document.getElementById('gameBoard');

        // 打亂順序
        const words = [...data].sort(() => Math.random() - 0.5);
        const images = [...data].sort(() => Math.random() - 0.5);

        words.forEach(item => {
            const el = document.createElement('div');
            el.className = 'word-card';
            el.textContent = item.word;
            el.draggable = true;
            el.id = `w-${item.id}`;
            el.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            // 增加觸控支持轉換 (簡單映射)
            el.addEventListener('touchstart', handleTouchStart, {passive: false});
            pool.appendChild(el);
        });

        images.forEach(item => {
            const el = document.createElement('div');
            el.className = 'drop-zone';
            el.dataset.id = item.id;
            el.innerHTML = `<span class="emoji">${item.img}</span>`;
            el.addEventListener('dragover', e => e.preventDefault());
            el.addEventListener('drop', handleDrop);
            board.appendChild(el);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const zone = e.target.closest('.drop-zone');
        if (zone.classList.contains('correct')) return;

        const id = e.dataTransfer.getData('text').split('-')[1];
        if (id === zone.dataset.id) {
            markCorrect(id, zone);
        }
    }

    function markCorrect(id, zone) {
        zone.classList.add('correct');
        const wordData = data.find(d => d.id == id);
        zone.innerHTML += `<div class="matched-label">${wordData.word}</div>`;
        document.getElementById(`w-${id}`).style.display = 'none';
        score++;
        document.getElementById('score').textContent = score;
        if (score === 10) endGame(true);
    }

    // 簡單的觸控拖拽模擬 (針對移動端瀏覽器優化)
    let activeCard = null;
    function handleTouchStart(e) {
        activeCard = e.target;
        const touch = e.touches[0];
        activeCard.style.position = 'fixed';
        moveAt(touch.pageX, touch.pageY);

        function moveAt(x, y) {
            activeCard.style.left = x - activeCard.offsetWidth / 2 + 'px';
            activeCard.style.top = y - activeCard.offsetHeight / 2 + 'px';
        }

        function onTouchMove(e) {
            e.preventDefault();
            moveAt(e.touches[0].pageX, e.touches[0].pageY);
        }

        document.addEventListener('touchmove', onTouchMove, {passive: false});

        activeCard.ontouchend = function(e) {
            document.removeEventListener('touchmove', onTouchMove);
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const zone = target ? target.closest('.drop-zone') : null;

            if (zone && zone.dataset.id === activeCard.id.split('-')[1]) {
                markCorrect(zone.dataset.id, zone);
            } else {
                activeCard.style.position = 'static';
            }
            activeCard.ontouchend = null;
        };
    }

    function startGame() {
        document.getElementById('startBtn').style.display = 'none';
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        clearInterval(timerId);
        const modal = document.getElementById('resultModal');
        modal.style.display = 'flex';
        document.getElementById('resultTitle').textContent = win ? "You Win! 🎉" : "Time's Up! ⏰";
        document.getElementById('resultScore').textContent = `Score: ${score}/10`;
    }

    init();
</script>
<script src="../touch-support.js"></script>
</body>
</html>
