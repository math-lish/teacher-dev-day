<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition of Location Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        #game-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover { background-color: #45a049; }
        
        /* Level 1 & 2 Visuals */
        #scene {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
            background-color: #e9ecef;
            border: 2px solid #ccc;
            border-radius: 10px;
        }
        
        /* Level 1 specific */
        .box {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #8b5a2b;
            top: 100px;
            left: 100px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
        }
        .ball {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* Level 2 specific (Emoji Scene) */
        .emoji-prop {
            position: absolute;
            font-size: 40px;
            transition: all 0.3s ease;
        }
        #sofa { top: 120px; left: 100px; font-size: 80px; }
        #table { top: 200px; left: 100px; font-size: 60px; }
        
        /* Interactive Zones (Clickable areas) */
        .zone {
            position: absolute;
            background-color: rgba(255, 255, 0, 0.2);
            border: 2px dashed #ffcc00;
            cursor: pointer;
            display: none; /* Shown only during placement mode */
        }
        .zone:hover { background-color: rgba(255, 255, 0, 0.5); }

        #question-area { margin-top: 20px; font-size: 18px; font-weight: bold; }
        #feedback { margin-top: 10px; font-weight: bold; color: #ff4757; height: 24px;}
        select { font-size: 16px; padding: 5px; }
    </style>
</head>
<body>

    <h1>📍 Preposition Master 空間介係詞遊戲</h1>
    
    <div id="game-container">
        <div id="controls">
            <button class="btn" onclick="startLevel(1, 'place')">Level 1: 放置球體 (簡單)</button>
            <button class="btn" onclick="startLevel(1, 'fill')">Level 1: 填寫單字 (簡單)</button>
            <br>
            <button class="btn" onclick="startLevel(2, 'place')">Level 2: 放置動物 (複雜)</button>
            <button class="btn" onclick="startLevel(2, 'fill')">Level 2: 填寫單字 (複雜)</button>
        </div>

        <div id="scene" style="display: none;">
            <div id="lvl1-elements" style="display: none;">
                <div class="box"></div>
                <div class="ball" id="the-ball" style="top: 10px; left: 10px;"></div>
            </div>
            
            <div id="lvl2-elements" style="display: none;">
                <div class="emoji-prop" id="sofa">🛋️</div>
                <div class="emoji-prop" id="table">🪑</div>
                <div class="emoji-prop" id="actor" style="top: 10px; left: 10px;">🐈</div> </div>

            <div id="zones-container"></div>
        </div>

        <div id="question-area"></div>
        <div id="feedback">請選擇上方的關卡開始遊戲！</div>
    </div>

    <script>
        const prepositions = ['on', 'under', 'next to', 'in front of', 'behind'];
        
        // Coordinates for Level 1 (Relative to the box 100x100 at 100,100)
        const coordsLvl1 = {
            'on': { top: '60px', left: '130px', zIndex: 10 },
            'under': { top: '200px', left: '130px', zIndex: 1 },
            'next to': { top: '130px', left: '210px', zIndex: 10 },
            'in front of': { top: '150px', left: '130px', zIndex: 20 },
            'behind': { top: '70px', left: '80px', zIndex: 1 }
        };

        // Coordinates for Level 2 (Relative to Sofa/Table)
        const coordsLvl2 = {
            'on': { top: '100px', left: '120px', zIndex: 10 }, // On sofa
            'under': { top: '240px', left: '120px', zIndex: 1 }, // Under table
            'next to': { top: '150px', left: '30px', zIndex: 10 }, // Next to sofa
            'in front of': { top: '180px', left: '130px', zIndex: 20 }, // In front of sofa
            'behind': { top: '90px', left: '150px', zIndex: 1 } // Behind sofa
        };

        let currentLevel = 1;
        let currentMode = 'place';
        let currentPrep = '';

        function startLevel(level, mode) {
            currentLevel = level;
            currentMode = mode;
            document.getElementById('scene').style.display = 'block';
            document.getElementById('feedback').innerText = '';
            
            // Setup visibility
            document.getElementById('lvl1-elements').style.display = level === 1 ? 'block' : 'none';
            document.getElementById('lvl2-elements').style.display = level === 2 ? 'block' : 'none';
            
            // Pick a random preposition
            currentPrep = prepositions[Math.floor(Math.random() * prepositions.length)];
            
            if (level === 2) {
                document.getElementById('actor').innerText = (currentPrep === 'under') ? '🐕' : '🐈';
            }

            if (mode === 'place') {
                setupPlaceMode();
            } else {
                setupFillMode();
            }
        }

        function setupPlaceMode() {
            const actor = currentLevel === 1 ? document.getElementById('the-ball') : document.getElementById('actor');
            const target = currentLevel === 1 ? 'the box' : 'the sofa/table';
            const actorName = currentLevel === 1 ? 'the ball' : 'the cat/dog';
            
            // Reset actor position to corner
            actor.style.top = '10px';
            actor.style.left = '10px';
            actor.style.zIndex = 10;

            document.getElementById('question-area').innerHTML = `Please place ${actorName} <b>${currentPrep.toUpperCase()}</b> ${target}. <br><small>(點擊畫面中的虛線黃色區域放置)</small>`;
            
            createZones();
        }

        function setupFillMode() {
            const actor = currentLevel === 1 ? document.getElementById('the-ball') : document.getElementById('actor');
            const coords = currentLevel === 1 ? coordsLvl1[currentPrep] : coordsLvl2[currentPrep];
            const actorName = currentLevel === 1 ? 'The ball' : 'The animal';
            const target = currentLevel === 1 ? 'the box' : 'the furniture';

            // Move actor to the target position
            actor.style.top = coords.top;
            actor.style.left = coords.left;
            actor.style.zIndex = coords.zIndex;

            // Remove interactive zones
            document.getElementById('zones-container').innerHTML = '';

            // Create dropdown
            let options = prepositions.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('question-area').innerHTML = 
                `${actorName} is <select id="answer-select">
                    <option value="" disabled selected>---</option>
                    ${options}
                </select> ${target}. 
                <button class="btn" onclick="checkFillAnswer()">送出</button>`;
        }

        function createZones() {
            const container = document.getElementById('zones-container');
            container.innerHTML = '';
            const coords = currentLevel === 1 ? coordsLvl1 : coordsLvl2;

            for (let prep in coords) {
                let zone = document.createElement('div');
                zone.className = 'zone';
                // Approximate zone sizes based on points
                zone.style.top = parseInt(coords[prep].top) - 20 + 'px';
                zone.style.left = parseInt(coords[prep].left) - 20 + 'px';
                zone.style.width = '60px';
                zone.style.height = '60px';
                zone.style.display = 'block';
                
                zone.onclick = () => checkPlaceAnswer(prep);
                container.appendChild(zone);
            }
        }

        function checkPlaceAnswer(selectedPrep) {
            if (selectedPrep === currentPrep) {
                document.getElementById('feedback').style.color = 'green';
                document.getElementById('feedback').innerText = '答對了！ Correct! 🎉';
                
                // Move actor
                const actor = currentLevel === 1 ? document.getElementById('the-ball') : document.getElementById('actor');
                const coords = currentLevel === 1 ? coordsLvl1[selectedPrep] : coordsLvl2[selectedPrep];
                actor.style.top = coords.top;
                actor.style.left = coords.left;
                actor.style.zIndex = coords.zIndex;
                
                // Remove zones
                document.getElementById('zones-container').innerHTML = '';
                
                setTimeout(() => startLevel(currentLevel, currentMode), 2000);
            } else {
                document.getElementById('feedback').style.color = 'red';
                document.getElementById('feedback').innerText = '再試一次！ Try again. ❌';
            }
        }

        function checkFillAnswer() {
            const selected = document.getElementById('answer-select').value;
            if (selected === currentPrep) {
                document.getElementById('feedback').style.color = 'green';
                document.getElementById('feedback').innerText = '答對了！ Correct! 🎉';
                setTimeout(() => startLevel(currentLevel, currentMode), 2000);
            } else {
                document.getElementById('feedback').style.color = 'red';
                document.getElementById('feedback').innerText = '再試一次！ Try again. ❌';
            }
        }
    </script>
<script src="../touch-support.js"></script>
</body>
</html>
