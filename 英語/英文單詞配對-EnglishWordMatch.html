<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單詞配對遊戲 | English Word Match</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg-color: #f0f8ff;
            --card-bg: #ffffff;
            --text-color: #333333;
            --error: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .timer-text { color: #ff9800; }
        .score-text { color: var(--primary); }

        .game-board {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        @media (min-width: 768px) {
            .game-board {
                flex-direction: row;
            }
        }

        .section {
            flex: 1;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-title {
            text-align: center;
            margin-top: 0;
            color: #666;
            font-size: 1.2rem;
        }

        /* Words Container (Draggables) */
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .word {
            background-color: #e3f2fd;
            border: 2px solid #2196F3;
            color: #1565C0;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .word:active { cursor: grabbing; transform: scale(0.95); }
        .word.dragged { opacity: 0.5; }
        .word.hidden { display: none; }

        /* Images Container (Dropzones) */
        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
        }

        .dropzone {
            border: 3px dashed #ccc;
            border-radius: 10px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .dropzone.dragover {
            background-color: #e8f5e9;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .dropzone.correct {
            border: 3px solid var(--primary);
            background-color: #dcedc8;
        }

        .dropzone.wrong {
            border-color: var(--error);
            animation: shake 0.4s;
        }

        .dropzone .matched-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-top: 5px;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .overlay.active { display: flex; }

        .result-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .result-box h2 {
            font-size: 2.5rem;
            margin-top: 0;
            color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn:hover { background: #388E3C; }
    </style>
</head>
<body>

    <h1>🍎 英文單詞配對遊戲 🐶</h1>
    
    <div class="stats">
        <div class="timer-text">時間: <span id="time">60</span>s</div>
        <div class="score-text">得分: <span id="score">0</span>/10</div>
    </div>

    <div class="game-board">
        <div class="section">
            <h2 class="section-title">拖曳單詞 (Drag Words)</h2>
            <div class="words" id="words-container"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">放到對應的圖片上 (Drop Here)</h2>
            <div class="images" id="images-container"></div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="result-box">
            <h2 id="result-title">時間到！</h2>
            <p style="font-size: 1.5rem;">最終得分: <span id="final-score">0</span> / 10</p>
            <button class="btn" onclick="startGame()">再玩一次 (Play Again)</button>
        </div>
    </div>

    <script>
        const dictionary = [
            { word: "Apple", icon: "🍎" },
            { word: "Cat", icon: "🐱" },
            { word: "Dog", icon: "🐶" },
            { word: "Sun", icon: "☀️" },
            { word: "Moon", icon: "🌙" },
            { word: "Car", icon: "🚗" },
            { word: "Tree", icon: "🌳" },
            { word: "Book", icon: "📖" },
            { word: "Star", icon: "⭐" },
            { word: "Fish", icon: "🐟" }
        ];

        let score = 0;
        let timeLeft = 60;
        let timerInterval;

        const wordsContainer = document.getElementById("words-container");
        const imagesContainer = document.getElementById("images-container");
        const scoreDisplay = document.getElementById("score");
        const timeDisplay = document.getElementById("time");
        const overlay = document.getElementById("overlay");
        const resultTitle = document.getElementById("result-title");
        const finalScoreDisplay = document.getElementById("final-score");

        // 隨機打亂陣列順序
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            wordsContainer.innerHTML = '';
            imagesContainer.innerHTML = '';
            score = 0;
            timeLeft = 60;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft;
            overlay.classList.remove('active');

            // 準備資料
            let wordsArray = shuffle([...dictionary]);
            let imagesArray = shuffle([...dictionary]);

            // 生成單詞按鈕
            wordsArray.forEach(item => {
                const wordEl = document.createElement("div");
                wordEl.classList.add("word");
                wordEl.innerText = item.word;
                wordEl.setAttribute("draggable", "true");
                wordEl.setAttribute("data-word", item.word);

                // 拖放事件 (Drag)
                wordEl.addEventListener("dragstart", dragStart);
                wordEl.addEventListener("dragend", dragEnd);

                wordsContainer.appendChild(wordEl);
            });

            // 生成圖片目標區塊
            imagesArray.forEach(item => {
                const dropzoneEl = document.createElement("div");
                dropzoneEl.classList.add("dropzone");
                dropzoneEl.innerHTML = `<span>${item.icon}</span>`;
                dropzoneEl.setAttribute("data-word", item.word);

                // 拖放事件 (Drop)
                dropzoneEl.addEventListener("dragover", dragOver);
                dropzoneEl.addEventListener("dragleave", dragLeave);
                dropzoneEl.addEventListener("drop", drop);

                imagesContainer.appendChild(dropzoneEl);
            });
        }

        // --- Drag & Drop 邏輯 ---
        function dragStart(e) {
            e.dataTransfer.setData("text/plain", e.target.getAttribute("data-word"));
            setTimeout(() => this.classList.add("dragged"), 0);
        }

        function dragEnd() {
            this.classList.remove("dragged");
        }

        function dragOver(e) {
            e.preventDefault(); // 允許放下
            if(!this.classList.contains("correct")){
                this.classList.add("dragover");
            }
        }

        function dragLeave() {
            this.classList.remove("dragover");
        }

        function drop(e) {
            e.preventDefault();
            this.classList.remove("dragover");

            // 如果已經配對成功，不再響應
            if (this.classList.contains("correct")) return;

            const draggedWord = e.dataTransfer.getData("text/plain");
            const targetWord = this.getAttribute("data-word");

            if (draggedWord === targetWord) {
                // 配對正確
                this.classList.add("correct");
                this.innerHTML += `<div class="matched-text">${draggedWord}</div>`;
                
                // 隱藏原始單詞
                const wordElement = document.querySelector(`.word[data-word="${draggedWord}"]`);
                wordElement.classList.add("hidden");

                // 更新分數
                score++;
                scoreDisplay.innerText = score;

                // 檢查是否全對
                if (score === dictionary.length) {
                    endGame(true);
                }
            } else {
                // 配對錯誤即時反饋 (震動與紅色邊框)
                this.classList.add("wrong");
                setTimeout(() => this.classList.remove("wrong"), 400);
            }
        }

        // --- 計時器邏輯 ---
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function endGame(isWin) {
            clearInterval(timerInterval);
            overlay.classList.add("active");
            finalScoreDisplay.innerText = score;
            
            if (isWin) {
                resultTitle.innerText = "🎉 恭喜你，全部配對成功！ 🎉";
                resultTitle.style.color = "#4CAF50";
            } else {
                resultTitle.innerText = "⏰ 時間到！ ⏰";
                resultTitle.style.color = "#f44336";
            }
        }

        function startGame() {
            initGame();
            startTimer();
        }

        // 頁面載入後自動開始
        window.onload = startGame;
    </script>
<script src="../touch-support.js"></script>
</body>
</html>
