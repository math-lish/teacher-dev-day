<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>乘法拔河：5秒極速生死戰</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 800px; margin: auto; background: #333; padding: 30px; border-radius: 20px; border: 4px solid #555; position: relative; }
        
        /* 倒數計時條 */
        .timer-wrapper { width: 100%; height: 12px; background: #444; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #000; }
        #timer-bar { width: 100%; height: 100%; background: #2ed573; transition: width 0.1s linear; }

        /* 拔河軌道 */
        .track { position: relative; width: 100%; height: 80px; background: #222; border-radius: 40px; margin: 30px 0; display: flex; align-items: center; border: 3px solid #444; }
        .boundary { position: absolute; width: 5px; height: 100%; background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .left-bound { left: 0; border-radius: 40px 0 0 40px; }
        .right-bound { right: 0; border-radius: 0 40px 40px 0; }
        
        #rope-flag { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 60px; background: #e74c3c; border-radius: 50%;
            transition: left 0.3s ease-out; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 30px; 
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.8);
        }

        #enemy-math { font-size: 72px; color: #ff4757; margin: 10px 0; font-weight: bold; text-shadow: 0 0 15px rgba(255, 71, 87, 0.6); }
        input { font-size: 40px; width: 200px; padding: 10px; text-align: center; border-radius: 15px; border: none; outline: none; background: #fff; color: #333; }
        
        .info-panel { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        #status-msg { height: 40px; margin: 15px 0; font-size: 22px; }
        
        .btn-start { padding: 15px 50px; font-size: 24px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 12px; transition: 0.2s; box-shadow: 0 5px 0 #b33939; }
        .btn-start:active { transform: translateY(3px); box-shadow: 0 2px 0 #b33939; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>⚡ 乘法拔河：5秒生死戰 ⚡</h1>
    
    <div class="info-panel">
        <span style="color: #54a0ff;">⬅️ 玩家 (拉向藍色贏)</span>
        <span id="timer-text" style="color: #2ed573;">剩餘時間: 5.0s</span>
        <span style="color: #ff4757;">電腦 (觸碰紅邊輸) ➡️</span>
    </div>

    <div class="timer-wrapper">
        <div id="timer-bar"></div>
    </div>

    <div class="track">
        <div class="boundary left-bound"></div>
        <div class="boundary right-bound"></div>
        <div id="rope-flag">🚩</div>
    </div>

    <div id="enemy-math">READY?</div>
    
    <div id="input-area" style="display: none;">
        <input type="number" id="ans-input" placeholder="答案" autocomplete="off">
        <div id="status-msg"></div>
    </div>

    <button id="start-btn" class="btn-start" onclick="startGame()">開始戰鬥</button>
</div>

<script>
    let currentPos = 50; 
    let correctAnswer = 0;
    let timeLeft = 50; // 以 0.1 秒為單位
    let timerInterval = null;
    const TIME_LIMIT = 50; 

    const flag = document.getElementById('rope-flag');
    const mathDisplay = document.getElementById('enemy-math');
    const input = document.getElementById('ans-input');
    const msg = document.getElementById('status-msg');
    const timerBar = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');
    const inputArea = document.getElementById('input-area');
    const startBtn = document.getElementById('start-btn');

    function startGame() {
        currentPos = 50;
        input.disabled = false;
        startBtn.style.display = 'none';
        inputArea.style.display = 'block';
        msg.innerText = "快速輸入答案！";
        updateFlag();
        nextQuestion();
    }

    function nextQuestion() {
        clearInterval(timerInterval);
        const n1 = Math.floor(Math.random() * 8) + 2; 
        const n2 = Math.floor(Math.random() * 11) + 2;
        correctAnswer = n1 * n2;
        
        mathDisplay.innerText = `${n1} × ${n2}`;
        input.value = '';
        input.focus();
        
        startTimer();
    }

    function startTimer() {
        timeLeft = TIME_LIMIT;
        updateTimerUI();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                penalty();
            }
        }, 100); // 每 0.1 秒更新一次增加流暢感
    }

    function updateTimerUI() {
        const percentage = (timeLeft / TIME_LIMIT) * 100;
        timerBar.style.width = percentage + '%';
        timerText.innerText = `剩餘時間: ${(timeLeft/10).toFixed(1)}s`;
        
        if (timeLeft <= 20) timerBar.style.backgroundColor = '#ff4757';
        else timerBar.style.backgroundColor = '#2ed573';
    }

    function penalty() {
        // 超時：對方直接拉回 15% (約一格大位移)
        currentPos += 15; 
        msg.innerText = "⚠️ 太慢了！被拉走一格！";
        msg.style.color = "#ff4757";
        
        updateFlag();
        if (!checkGameOver()) nextQuestion();
    }

    input.addEventListener('keyup', (e) => {
        if (e.key === 'Enter' && input.value !== '') {
            const userVal = parseInt(input.value);
            if (userVal === correctAnswer) {
                clearInterval(timerInterval);
                // 答對拉力計算：答案越高拉力越強
                let pullStrength = (userVal / 8); 
                currentPos -= pullStrength; 
                
                msg.innerText = `💥 強力回擊！拉力: ${userVal}`;
                msg.style.color = "#2ed573";
                
                updateFlag();
                if (!checkGameOver()) nextQuestion();
            } else {
                // 答錯輕微懲罰
                currentPos += 5;
                msg.innerText = "❌ 算錯了！重心不穩！";
                msg.style.color = "#ff9f43";
                updateFlag();
                checkGameOver();
            }
        }
    });

    function updateFlag() {
        // 限制在 0-100% 之間
        if (currentPos < 0) currentPos = 0;
        if (currentPos > 100) currentPos = 100;
        flag.style.left = currentPos + '%';
    }

    function checkGameOver() {
        // 判定是否碰到邊界 (0% 為玩家贏，100% 為電腦贏)
        if (currentPos <= 2) { // 碰到左邊界
            endGame("🏆 你贏了！對方被你拉出邊界了！", "#2ed573");
            return true;
        } else if (currentPos >= 98) { // 碰到右邊界
            endGame("💀 你輸了！你被拉出邊界了！", "#ff4757");
            return true;
        }
        return false;
    }

    function endGame(finalMsg, color) {
        clearInterval(timerInterval);
        mathDisplay.innerText = "GAME OVER";
        mathDisplay.style.color = color;
        msg.innerText = finalMsg;
        msg.style.color = color;
        input.disabled = true;
        startBtn.style.display = 'inline-block';
        startBtn.innerText = "再戰一回";
    }
</script>

</body>
</html>
