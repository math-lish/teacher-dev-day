<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>矩陣爭奪戰 (Matrix Conquest)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; }
        h1 { color: #333; }
        #game-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #controls { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; font-weight: bold; font-size: 1.2em; }
        .player1-text { color: #3498db; }
        .player2-text { color: #e74c3c; }
        #board { display: grid; grid-template-columns: repeat(20, 20px); grid-template-rows: repeat(20, 20px); gap: 1px; background-color: #ccc; border: 2px solid #999; }
        .cell { width: 20px; height: 20px; background-color: #fff; cursor: pointer; transition: 0.2s; }
        .cell:hover { filter: brightness(0.8); }
        .player1 { background-color: #3498db !important; }
        .player2 { background-color: #e74c3c !important; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background-color: #2ecc71; color: white; transition: 0.2s; margin: 5px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .factor-btn { background-color: #9b59b6; }
        .factor-btn:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

    <h1>領土擴張：矩陣爭奪戰</h1>
    
    <div id="game-container">
        <div id="controls">
            <div class="stats">
                <span class="player1-text" id="score1">藍方分數: 0</span>
                <span id="turn-indicator">現在輪到：藍方</span>
                <span class="player2-text" id="score2">紅方分數: 0</span>
            </div>
            
            <button id="draw-btn" onclick="drawNumbers()">1. 抽取數字</button>
            <h2 id="number-display">-- 與 --</h2>
            
            <div id="factor-options"></div>
            <p id="action-status">請先抽取數字</p>
            <button id="skip-btn" onclick="nextTurn()" style="display:none; background-color:#e67e22;">跳過此回合</button>
        </div>

        <div id="board"></div>
    </div>

    <script>
        const BOARD_SIZE = 20;
        let currentPlayer = 1;
        let p1Score = 0, p2Score = 0;
        let currentFactor = 0;
        let blocksLeft = 0;
        let grid = [];

        // 初始化網格
        const boardEl = document.getElementById('board');
        for (let y = 0; y < BOARD_SIZE; y++) {
            grid[y] = [];
            for (let x = 0; x < BOARD_SIZE; x++) {
                grid[y][x] = 0;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.x = x;
                cell.dataset.y = y;
                cell.onclick = () => placeBlock(x, y);
                boardEl.appendChild(cell);
            }
        }

        // 求最大公因數
        function getGCD(a, b) {
            return b === 0 ? a : getGCD(b, a % b);
        }

        // 抽取數字並計算公因數
        function drawNumbers() {
            document.getElementById('draw-btn').disabled = true;
            
            let num1 = Math.floor(Math.random() * 15) + 2; 
            let num2 = Math.floor(Math.random() * 15) + 2;
            document.getElementById('number-display').innerText = `${num1} 與 ${num2}`;
            
            let gcd = getGCD(num1, num2);
            let factors = [];
            for (let i = 1; i <= gcd; i++) {
                if (num1 % i === 0 && num2 % i === 0) factors.push(i);
            }

            renderFactorButtons(factors, gcd);
            document.getElementById('skip-btn').style.display = 'inline-block';
        }

        // 顯示可選擇的公因數按鈕
        function renderFactorButtons(factors, gcd) {
            const container = document.getElementById('factor-options');
            container.innerHTML = '<p>2. 選擇你要使用的積木大小：</p>';
            
            if (gcd === 1) {
                container.innerHTML += '<p style="color:red; font-weight:bold;">互質！只能畫 1 個 1x1 的格子！</p>';
            }

            let maxArea = gcd * gcd;

            factors.forEach(f => {
                let count = Math.floor(maxArea / (f * f));
                let btn = document.createElement('button');
                btn.className = 'factor-btn';
                btn.innerText = `邊長 ${f} (可畫 ${count} 個)`;
                btn.onclick = () => startPlacing(f, count);
                container.appendChild(btn);
            });
        }

        // 開始放置積木
        function startPlacing(factor, count) {
            currentFactor = factor;
            blocksLeft = count;
            document.getElementById('factor-options').innerHTML = '';
            updateStatus();
        }

        function updateStatus() {
            const statusEl = document.getElementById('action-status');
            if (blocksLeft > 0) {
                statusEl.innerText = `請在網格上點擊放置 ${currentFactor}x${currentFactor} 的積木 (剩餘 ${blocksLeft} 個)`;
            } else {
                nextTurn();
            }
        }

        // 放置邏輯（檢查空間是否足夠且為空）
        function placeBlock(startX, startY) {
            if (blocksLeft <= 0 || currentFactor === 0) return;

            // 檢查邊界與重疊
            if (startX + currentFactor > BOARD_SIZE || startY + currentFactor > BOARD_SIZE) {
                alert("超出邊界了！"); return;
            }
            for (let y = startY; y < startY + currentFactor; y++) {
                for (let x = startX; x < startX + currentFactor; x++) {
                    if (grid[y][x] !== 0) {
                        alert("這裡已經有領地了！"); return;
                    }
                }
            }

            // 畫上去
            for (let y = startY; y < startY + currentFactor; y++) {
                for (let x = startX; x < startX + currentFactor; x++) {
                    grid[y][x] = currentPlayer;
                    let cellIndex = y * BOARD_SIZE + x;
                    boardEl.children[cellIndex].classList.add(currentPlayer === 1 ? 'player1' : 'player2');
                }
            }

            // 更新分數與狀態
            let area = currentFactor * currentFactor;
            if (currentPlayer === 1) p1Score += area;
            else p2Score += area;
            
            document.getElementById('score1').innerText = `藍方分數: ${p1Score}`;
            document.getElementById('score2').innerText = `紅方分數: ${p2Score}`;

            blocksLeft--;
            updateStatus();
        }

        // 換下一位玩家
        function nextTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            currentFactor = 0;
            blocksLeft = 0;
            
            const turnIndicator = document.getElementById('turn-indicator');
            turnIndicator.innerText = `現在輪到：${currentPlayer === 1 ? '藍方' : '紅方'}`;
            turnIndicator.className = currentPlayer === 1 ? 'player1-text' : 'player2-text';
            
            document.getElementById('action-status').innerText = '請先抽取數字';
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('factor-options').innerHTML = '';
            document.getElementById('skip-btn').style.display = 'none';
        }
    </script>
</body>
</html>
