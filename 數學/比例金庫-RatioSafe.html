<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破解比例金庫 (Crack the Ratio Safe)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #ecf0f1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        .score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .equation-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
            font-size: 2rem;
            font-weight: bold;
        }

        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fraction .top {
            border-bottom: 3px solid var(--primary);
            padding: 0 10px;
            min-width: 30px;
        }

        .fraction .bottom {
            padding: 0 10px;
        }

        .drop-zone {
            width: 50px;
            height: 45px;
            border: 3px dashed #bdc3c7;
            border-radius: 8px;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7f8c8d;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background-color: #e8f4f8;
        }

        .options-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .draggable {
            width: 60px;
            height: 60px;
            background-color: var(--accent);
            color: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .draggable:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .feedback {
            min-height: 24px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        .btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn:hover { background-color: var(--primary); }

        /* 答錯時的震動動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h2>解碼金庫</h2>
        <div class="score-board">分數: <span id="score">0</span></div>
    </div>

    <div id="game-content">
        <p>找出未知數，拖曳下方數字到虛線框內！<br><small>（手機用戶可直接點擊數字）</small></p>
        
        <div class="equation-area" id="equation-container">
            </div>

        <div class="feedback" id="feedback-msg"></div>

        <div class="options-area" id="options-container">
            </div>
    </div>

    <button class="btn" onclick="resetGame()">重置進度</button>
</div>

<script>
    // 1. 遊戲資料設定 (包含前兩關的題目)
    const levels = [
        { q: { top1: '?', bottom1: '4', top2: '5', bottom2: '10' }, ans: 2, options: [1, 2, 3, 4] },
        { q: { top1: '3', bottom1: '?', top2: '9', bottom2: '12' }, ans: 4, options: [2, 3, 4, 6] },
        { q: { top1: '6', bottom1: '10', top2: '?', bottom2: '5' }, ans: 3, options: [3, 4, 5, 6] },
        { q: { top1: '?', bottom1: '12', top2: '15', bottom2: '36' }, ans: 5, options: [4, 5, 6, 7] },
        { q: { top1: '7', bottom1: '8', top2: '?', bottom2: '24' }, ans: 21, options: [14, 18, 21, 24] }
    ];

    let currentLevel = 0;
    let score = 0;

    // 2. 初始化與讀取進度 (localStorage)
    function initGame() {
        const savedScore = localStorage.getItem('ratioGameScore');
        const savedLevel = localStorage.getItem('ratioGameLevel');
        
        if (savedScore !== null) score = parseInt(savedScore);
        if (savedLevel !== null) currentLevel = parseInt(savedLevel);

        if (currentLevel >= levels.length) {
            showWinScreen();
        } else {
            updateScore();
            renderLevel();
        }
    }

    // 3. 渲染關卡
    function renderLevel() {
        const levelData = levels[currentLevel];
        const eqContainer = document.getElementById('equation-container');
        const optContainer = document.getElementById('options-container');
        document.getElementById('feedback-msg').textContent = '';

        // 渲染等式
        let html = '';
        const buildFraction = (top, bottom) => {
            const topHtml = top === '?' ? `<div class="top drop-zone" id="drop-target" ondrop="drop(event)" ondragover="allowDrop(event)">?</div>` : `<div class="top">${top}</div>`;
            const bottomHtml = bottom === '?' ? `<div class="bottom drop-zone" id="drop-target" ondrop="drop(event)" ondragover="allowDrop(event)">?</div>` : `<div class="bottom">${bottom}</div>`;
            return `<div class="fraction">${topHtml}${bottomHtml}</div>`;
        };

        html += buildFraction(levelData.q.top1, levelData.q.bottom1);
        html += `<div class="equals">=</div>`;
        html += buildFraction(levelData.q.top2, levelData.q.bottom2);
        eqContainer.innerHTML = html;

        // 隨機打亂並渲染選項
        optContainer.innerHTML = '';
        const shuffledOptions = [...levelData.options].sort(() => Math.random() - 0.5);
        shuffledOptions.forEach(num => {
            const btn = document.createElement('div');
            btn.className = 'draggable';
            btn.draggable = true;
            btn.textContent = num;
            
            // 電腦端拖放事件
            btn.ondragstart = (e) => e.dataTransfer.setData('text/plain', num);
            
            // 手機端點擊支援 (替代拖放)
            btn.onclick = () => checkAnswer(num);
            
            optContainer.appendChild(btn);
        });
    }

    // 4. HTML5 拖放 API 處理
    function allowDrop(e) {
        e.preventDefault();
        e.target.classList.add('drag-over');
    }

    // 移除 drag-over 樣式
    document.addEventListener('dragleave', (e) => {
        if (e.target.classList.contains('drop-zone')) {
            e.target.classList.remove('drag-over');
        }
    });

    function drop(e) {
        e.preventDefault();
        e.target.classList.remove('drag-over');
        const draggedData = e.dataTransfer.getData('text/plain');
        if (draggedData) checkAnswer(parseInt(draggedData));
    }

    // 5. 即時反饋與分數計算
    function checkAnswer(selectedNumber) {
        const correctAnswer = levels[currentLevel].ans;
        const feedback = document.getElementById('feedback-msg');
        const gameContainer = document.querySelector('.game-container');

        if (selectedNumber === correctAnswer) {
            feedback.textContent = '正確！解鎖成功！';
            feedback.className = 'feedback text-success';
            score += 20;
            currentLevel++;
            
            // 保存進度
            localStorage.setItem('ratioGameScore', score);
            localStorage.setItem('ratioGameLevel', currentLevel);
            
            updateScore();
            
            setTimeout(() => {
                if (currentLevel >= levels.length) {
                    showWinScreen();
                } else {
                    renderLevel();
                }
            }, 1000);
        } else {
            feedback.textContent = '密碼錯誤，請再試一次！';
            feedback.className = 'feedback text-danger';
            
            // 觸發震動動畫
            gameContainer.classList.add('shake');
            setTimeout(() => gameContainer.classList.remove('shake'), 400);
        }
    }

    function updateScore() {
        document.getElementById('score').textContent = score;
    }

    function showWinScreen() {
        document.getElementById('game-content').innerHTML = `
            <h2>🎉 恭喜你破解了所有金庫！ 🎉</h2>
            <p>你的最終分數是: <strong>${score}</strong></p>
        `;
    }

    function resetGame() {
        localStorage.removeItem('ratioGameScore');
        localStorage.removeItem('ratioGameLevel');
        score = 0;
        currentLevel = 0;
        location.reload();
    }

    // 啟動遊戲
    initGame();
</script>

</body>
</html>
