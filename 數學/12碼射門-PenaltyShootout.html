<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12碼足球入球遊戲</title>
    <style>
        :root {
            --grass-color: #4CAF50;
            --grass-dark: #388E3C;
            --sky-color: #87CEEB;
            --text-color: #333;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--sky-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* 防止滾動 */
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .stats {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFEB3B;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            height: 30px;
            margin-bottom: 10px;
            z-index: 10;
        }

        /* 球場與球門區域 */
        .field {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            background: linear-gradient(var(--grass-dark) 0%, var(--grass-color) 100%);
            border-top: 5px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.2);
        }

        .goal-post {
            position: absolute;
            top: 20px;
            width: 80%;
            height: 150px;
            border: 8px solid white;
            border-bottom: none;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)), 
                linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2));
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            display: flex;
        }

        /* 射門互動區 (左、中、右) */
        .target-zone {
            flex: 1;
            height: 100%;
            cursor: crosshair;
            transition: background-color 0.2s;
        }

        .target-zone:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* 守門員 */
        #goalkeeper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* 平滑撲救動畫 */
            z-index: 2;
        }

        /* 足球 */
        #ball {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(1);
            font-size: 3.5rem;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 3;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.4));
        }

        /* 射門後的足球動畫 class */
        .shot-left { bottom: 200px !important; left: 15% !important; transform: translateX(-50%) scale(0.6) rotate(-360deg) !important; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.6)) !important; }
        .shot-center { bottom: 210px !important; left: 50% !important; transform: translateX(-50%) scale(0.6) rotate(360deg) !important; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.6)) !important; }
        .shot-right { bottom: 200px !important; left: 85% !important; transform: translateX(-50%) scale(0.6) rotate(360deg) !important; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.6)) !important; }

        /* 守門員撲救的動畫 class */
        .dive-left { left: 20% !important; transform: translateX(-50%) rotate(-45deg) !important; }
        .dive-right { left: 80% !important; transform: translateX(-50%) rotate(45deg) !important; }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <h1>🏆 12碼射門挑戰 🏆</h1>
    
    <div class="stats">
        進球: <span id="score" style="color: #4CAF50;">0</span> / 射門次數: <span id="attempts">0</span>
    </div>
    
    <div id="message">點擊球門的 左、中、右 來射門！</div>

    <div class="field">
        <div class="goal-post">
            <div class="target-zone" onclick="shoot('left')"></div>
            <div class="target-zone" onclick="shoot('center')"></div>
            <div class="target-zone" onclick="shoot('right')"></div>
            
            <div id="goalkeeper">🧤</div>
        </div>
        <div id="ball">⚽</div>
    </div>

    <button onclick="resetGame()">重新開始遊戲</button>

    <script>
        let score = 0;
        let attempts = 0;
        let isShooting = false; // 防止連續點擊

        const ball = document.getElementById('ball');
        const goalkeeper = document.getElementById('goalkeeper');
        const scoreEl = document.getElementById('score');
        const attemptsEl = document.getElementById('attempts');
        const messageEl = document.getElementById('message');

        function shoot(playerDirection) {
            if (isShooting) return; // 如果球還在飛，不允許再次射門
            isShooting = true;
            attempts++;
            
            messageEl.innerText = "";

            // 1. 守門員隨機選擇撲救方向
            const directions = ['left', 'center', 'right'];
            const gkDirection = directions[Math.floor(Math.random() * directions.length)];

            // 2. 執行射門與撲救動畫
            ball.className = `shot-${playerDirection}`; // 球飛向玩家點擊的方向
            
            if (gkDirection === 'left') {
                goalkeeper.className = 'dive-left';
            } else if (gkDirection === 'right') {
                goalkeeper.className = 'dive-right';
            } else {
                goalkeeper.className = ''; // 守在中間
            }

            // 3. 判斷進球或被撲出 (等待動畫結束 400ms)
            setTimeout(() => {
                if (playerDirection === gkDirection) {
                    // 守門員猜中方向
                    messageEl.innerText = "❌ 漂亮撲救！球被擋下了！";
                    messageEl.style.color = "#f44336";
                } else {
                    // 進球
                    score++;
                    messageEl.innerText = "GOAL!!! ⚽🔥";
                    messageEl.style.color = "#4CAF50";
                }
                
                // 更新分數板
                scoreEl.innerText = score;
                attemptsEl.innerText = attempts;

                // 4. 重置球與守門員位置，準備下一次射門
                setTimeout(prepareNextShot, 1500);

            }, 400); // 這裡的時間與 CSS transition 的時間一致
        }

        function prepareNextShot() {
            // 移除動畫 class，讓球和守門員回到原位
            ball.className = '';
            goalkeeper.className = '';
            messageEl.innerText = "點擊球門的 左、中、右 來射門！";
            messageEl.style.color = "#FFEB3B";
            isShooting = false;
        }

        function resetGame() {
            score = 0;
            attempts = 0;
            scoreEl.innerText = score;
            attemptsEl.innerText = attempts;
            prepareNextShot();
        }
    </script>
</body>
</html>
