<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語大挑戰：自食其力 vs 自食其果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .card-enter {
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes slideIn {
            0% { transform: translateY(20px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .polaroid {
            background: white;
            padding: 1rem 1rem 3rem 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            transform: rotate(-1deg);
            transition: transform 0.3s;
        }
        
        .polaroid:hover {
            transform: rotate(1deg) scale(1.02);
        }

        .emoji-scene {
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #e5e7eb;
            padding: 2rem;
            border-radius: 8px;
            min-height: 160px;
        }

        .btn-hover-effect:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
        <!-- 頂部標題與分數 -->
        <div class="bg-indigo-600 text-white p-6 text-center relative">
            <h1 class="text-3xl font-bold mb-2 tracking-wider">成語圖片大挑戰</h1>
            <p class="text-indigo-200">看圖說故事，這究竟是「自食其力」還是「自食其果」？</p>
            <div class="absolute top-4 right-4 bg-white text-indigo-600 px-3 py-1 rounded-full font-bold shadow">
                得分: <span id="score">0</span> / <span id="total">0</span>
            </div>
        </div>

        <!-- 遊戲主要內容區 -->
        <div class="p-8" id="game-area">
            
            <!-- 進度條 -->
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <!-- 圖片(情境)展示區 -->
            <div id="question-container" class="card-enter flex flex-col items-center mb-8">
                <div class="polaroid w-full max-w-md">
                    <div id="image-display" class="emoji-scene mb-4">
                        <!-- Emoji 將由 JS 填入 -->
                    </div>
                    <p id="image-caption" class="text-center text-gray-700 font-medium text-lg italic">
                        <!-- 圖片說明將由 JS 填入 -->
                    </p>
                </div>
            </div>

            <!-- 選擇按鈕 -->
            <div id="options-container" class="grid grid-cols-2 gap-4">
                <button onclick="checkAnswer('自食其力')" class="btn-hover-effect bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 px-6 rounded-xl shadow-md transition duration-200 flex flex-col items-center">
                    <span class="mb-1">💪 自食其力</span>
                    <span class="text-sm font-normal text-green-100">靠自己努力</span>
                </button>
                <button onclick="checkAnswer('自食其果')" class="btn-hover-effect bg-red-500 hover:bg-red-600 text-white text-xl font-bold py-4 px-6 rounded-xl shadow-md transition duration-200 flex flex-col items-center">
                    <span class="mb-1">🤦‍♂️ 自食其果</span>
                    <span class="text-sm font-normal text-red-100">承擔壞後果</span>
                </button>
            </div>

            <!-- 提示與解析區 (預設隱藏) -->
            <div id="feedback-container" class="hidden mt-6 p-5 rounded-xl text-center">
                <h2 id="feedback-title" class="text-2xl font-bold mb-2"></h2>
                <p id="feedback-explanation" class="text-gray-700 text-lg mb-4"></p>
                <button onclick="nextQuestion()" class="btn-hover-effect bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-lg transition duration-200 shadow-md">
                    下一題 ➡️
                </button>
            </div>
        </div>

        <!-- 結算畫面 (預設隱藏) -->
        <div class="p-8 text-center hidden" id="result-area">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">遊戲完成！</h2>
            <p class="text-xl text-gray-600 mb-6">你的最終得分是：<span id="final-score" class="font-bold text-indigo-600 text-3xl"></span> 分</p>
            <p id="final-message" class="text-lg text-gray-700 mb-8 font-medium"></p>
            <button onclick="initGame()" class="btn-hover-effect bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition duration-200 shadow-md text-xl">
                🔄 再玩一次
            </button>
        </div>

    </div>

    <script>
        // 題庫設計
        const questions = [
            {
                image: "👨‍🌾 💦 ➡️ 🌾 🍞",
                caption: "「農夫辛勤耕種，最後收穫並做成麵包享受。」",
                answer: "自食其力",
                explanation: "農夫依靠自己的勞動力獲得食物，這正是「自食其力」的表現！"
            },
            {
                image: "🚶‍♂️ 🍌🗑️ ➡️ 💥 🤕",
                caption: "「亂丟香蕉皮，結果自己沒注意踩到滑倒了。」",
                answer: "自食其果",
                explanation: "自己做了缺乏公德心的事，最後害到自己受傷，這就是「自食其果」。"
            },
            {
                image: "🧶 ✂️ 🧵 ➡️ 🧥 😊",
                caption: "「冬天到了，自己買毛線編織了一件溫暖的毛衣穿。」",
                answer: "自食其力",
                explanation: "不依賴他人，靠自己的雙手滿足生活需求，屬於「自食其力」。"
            },
            {
                image: "🕳️ 😈 ➡️ 🏃‍♂️ 🕳️ 😭",
                caption: "「故意在路上挖洞想捉弄別人，結果晚上自己掉進去了。」",
                answer: "自食其果",
                explanation: "俗話說『害人害己』，自己種下的惡因，自己承受惡果，是「自食其果」。"
            },
            {
                image: "📚 ✍️ 🕛 ➡️ 🎓 🏆",
                caption: "「每天熬夜苦讀，最後順利畢業並拿到獎學金。」",
                answer: "自食其力",
                explanation: "透過自己付出的努力來取得回報與成就，這也是廣義的「自食其力」。"
            },
            {
                image: "🏭 🛢️ 🏞️ ➡️ 🚱 🤢",
                caption: "「工廠老闆為了省錢偷排廢水，結果當地的水連他自己都不能喝了。」",
                answer: "自食其果",
                explanation: "破壞環境最終反噬到自己身上，這絕對是「自食其果」的最佳寫照。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        // DOM 元素
        const gameArea = document.getElementById('game-area');
        const resultArea = document.getElementById('result-area');
        const imageDisplay = document.getElementById('image-display');
        const imageCaption = document.getElementById('image-caption');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackExplanation = document.getElementById('feedback-explanation');
        const scoreDisplay = document.getElementById('score');
        const totalDisplay = document.getElementById('total');
        const progressBar = document.getElementById('progress-bar');
        const questionContainer = document.getElementById('question-container');

        // 初始化遊戲
        function initGame() {
            // 打亂題目順序 (洗牌演算法)
            questions.sort(() => Math.random() - 0.5);
            
            currentQuestionIndex = 0;
            score = 0;
            totalDisplay.innerText = questions.length;
            scoreDisplay.innerText = score;
            
            gameArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            
            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            const currentQ = questions[currentQuestionIndex];
            
            // 更新進度條
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;

            // 重置動畫
            questionContainer.classList.remove('card-enter');
            void questionContainer.offsetWidth; // 觸發重繪 (Reflow)
            questionContainer.classList.add('card-enter');

            // 渲染內容
            imageDisplay.innerHTML = currentQ.image;
            imageCaption.innerText = currentQ.caption;
            
            // 顯示選項，隱藏回饋
            optionsContainer.classList.remove('hidden');
            feedbackContainer.classList.add('hidden');
        }

        // 檢查答案
        function checkAnswer(userChoice) {
            const currentQ = questions[currentQuestionIndex];
            const isCorrect = userChoice === currentQ.answer;

            // 隱藏選項
            optionsContainer.classList.add('hidden');
            
            // 顯示回饋區
            feedbackContainer.classList.remove('hidden');
            feedbackContainer.classList.remove('bg-green-50', 'bg-red-50');
            feedbackTitle.classList.remove('text-green-600', 'text-red-600');

            if (isCorrect) {
                score++;
                scoreDisplay.innerText = score;
                feedbackContainer.classList.add('bg-green-50');
                feedbackTitle.classList.add('text-green-600');
                feedbackTitle.innerHTML = "✅ 答對了！這就是「" + currentQ.answer + "」";
            } else {
                feedbackContainer.classList.add('bg-red-50');
                feedbackTitle.classList.add('text-red-600');
                feedbackTitle.innerHTML = "❌ 答錯了！應該是「" + currentQ.answer + "」才對";
            }

            feedbackExplanation.innerText = currentQ.explanation;
            
            // 更新進度條到當前提完的狀態
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        // 下一題或結算
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 顯示結果
        function showResult() {
            gameArea.classList.add('hidden');
            resultArea.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            
            const messageEl = document.getElementById('final-message');
            if (score === questions.length) {
                messageEl.innerText = "太厲害了！你完全掌握了這兩個成語的精髓！🌟";
            } else if (score >= questions.length / 2) {
                messageEl.innerText = "表現不錯！再多練習幾次就能拿滿分囉！👍";
            } else {
                messageEl.innerText = "別灰心，成語本來就需要時間理解，再試一次吧！💪";
            }
        }

        // 啟動遊戲
        window.onload = initGame;
    </script>
<script src="../touch-support.js"></script>
</body>
</html>
