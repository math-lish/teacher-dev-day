<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文基礎詞語配對遊戲</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #fdfdfd;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.3rem;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 遊戲區域 */
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
        }

        /* 詞語卡片區域 */
        .words-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .word-card {
            background: #fff;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: grab;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--primary);
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .word-card:active { cursor: grabbing; transform: scale(1.1); }

        /* 圖片目標區域 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .drop-zone {
            background: white;
            border: 3px dashed #ddd;
            border-radius: 15px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            transition: 0.3s;
        }

        .drop-zone svg { width: 70px; height: 70px; margin-bottom: 10px; }
        .drop-zone .hint { font-size: 0.8rem; color: #aaa; }

        .drop-zone.hover { background: #ebf5fb; border-color: var(--primary); }
        .drop-zone.matched { 
            border: 3px solid var(--success); 
            background: #eafaf1; 
            animation: bounce 0.5s ease;
        }

        .matched-text {
            color: var(--success);
            font-weight: bold;
            font-size: 1.3rem;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 600px) {
            .image-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🌟 基礎詞語配對遊戲</h1>
    <p>拖動詞語卡片到正確的圖片中！</p>
</div>

<div class="stats">
    <div>時間: <span id="timer">60</span>s</div>
    <div>得分: <span id="score">0</span> / 10</div>
</div>

<button id="start-btn">開始遊戲</button>

<div class="game-container" id="game-ui" style="display:none;">
    <div class="words-section" id="words-bank"></div>
    <div class="image-grid" id="images-bank"></div>
</div>

<script>
    // 簡單的圖標數據 (SVG)
    const gameData = [
        { id: 1, text: "陽光", hint: "暖洋洋的", svg: `<svg viewBox="0 0 24 24" fill="#f1c40f"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h3c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h3c.55 0 1-.45 1-1s-.45-1-1-1h-3c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v3c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v3c0 .55.45 1 1 1s1-.45 1-1v-3c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l2.12 2.12c.39.39 1.02.39 1.41 0s.39-1.02 0-1.41L5.99 4.58zm12.02 12.02a.996.996 0 00-1.41 0 .996.996 0 000 1.41l2.12 2.12c.39.39 1.02.39 1.41 0s.39-1.02 0-1.41l-2.12-2.12zM16.59 7.41c.39.39 1.02.39 1.41 0l2.12-2.12a.996.996 0 000-1.41.996.996 0 00-1.41 0l-2.12 2.12c-.39.39-.39 1.02 0 1.41zm-12.02 12.02c.39.39 1.02.39 1.41 0l2.12-2.12a.996.996 0 000-1.41.996.996 0 00-1.41 0l-2.12 2.12c-.39.39-.39 1.02 0 1.41z"/></svg>` },
        { id: 2, text: "森林", hint: "綠色的樹", svg: `<svg viewBox="0 0 24 24" fill="#27ae60"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>` },
        { id: 3, text: "海洋", hint: "藍藍的海", svg: `<svg viewBox="0 0 24 24" fill="#3498db"><path d="M12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-18C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2z"/></svg>` },
        { id: 4, text: "大山", hint: "高高的", svg: `<svg viewBox="0 0 24 24" fill="#7f8c8d"><path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z"/></svg>` },
        { id: 5, text: "蘋果", hint: "紅色的水果", svg: `<svg viewBox="0 0 24 24" fill="#e74c3c"><path d="M20 10c0-4.42-3.58-8-8-8s-8 3.58-8 8 3.58 8 8 8 8-3.58 8-8z"/></svg>` },
        { id: 6, text: "月亮", hint: "晚上的光", svg: `<svg viewBox="0 0 24 24" fill="#f1c40f"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/></svg>` },
        { id: 7, text: "下雨", hint: "滴答滴答", svg: `<svg viewBox="0 0 24 24" fill="#2980b9"><path d="M12 2c-5.33 4.55-8 9.1-8 13.52C4 19.44 7.58 23 12 23s8-3.56 8-7.48C20 11.1 17.33 6.55 12 2z"/></svg>` },
        { id: 8, text: "花朵", hint: "香噴噴", svg: `<svg viewBox="0 0 24 24" fill="#e91e63"><path d="M12 22c4.97 0 9-4.03 9-9s-4.03-9-9-9-9 4.03-9 9 4.03 9 9 9z"/></svg>` },
        { id: 9, text: "汽車", hint: "嘟嘟嘟", svg: `<svg viewBox="0 0 24 24" fill="#34495e"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/></svg>` },
        { id: 10, text: "雨傘", hint: "擋雨的", svg: `<svg viewBox="0 0 24 24" fill="#9b59b6"><path d="M12 2c-4.41 0-8 3.59-8 8v1h16v-1c0-4.41-3.59-8-8-8zm0 18c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2z"/></svg>` }
    ];

    let score = 0;
    let timer = 60;
    let gameInterval;

    const startBtn = document.getElementById('start-btn');
    const gameUI = document.getElementById('game-ui');
    const wordsBank = document.getElementById('words-bank');
    const imagesBank = document.getElementById('images-bank');

    function initGame() {
        score = 0;
        timer = 60;
        document.getElementById('score').textContent = score;
        document.getElementById('timer').textContent = timer;
        wordsBank.innerHTML = '';
        imagesBank.innerHTML = '';

        // 隨機排序
        const shuffledWords = [...gameData].sort(() => Math.random() - 0.5);
        const shuffledImages = [...gameData].sort(() => Math.random() - 0.5);

        shuffledWords.forEach(data => {
            const div = document.createElement('div');
            div.className = 'word-card';
            div.textContent = data.text;
            div.draggable = true;
            div.dataset.id = data.id;
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', data.id));
            wordsBank.appendChild(div);
        });

        shuffledImages.forEach(data => {
            const div = document.createElement('div');
            div.className = 'drop-zone';
            div.dataset.id = data.id;
            div.innerHTML = `${data.svg}<div class="hint">${data.hint}</div>`;
            
            div.addEventListener('dragover', (e) => {
                e.preventDefault();
                div.classList.add('hover');
            });
            div.addEventListener('dragleave', () => div.classList.remove('hover'));
            div.addEventListener('drop', (e) => {
                e.preventDefault();
                div.classList.remove('hover');
                const draggedId = e.dataTransfer.getData('text');
                if (draggedId == data.id) {
                    handleMatch(div, draggedId);
                }
            });
            imagesBank.appendChild(div);
        });
    }

    function handleMatch(zone, id) {
        zone.classList.add('matched');
        const wordData = gameData.find(d => d.id == id);
        zone.innerHTML = `<span class="matched-text">${wordData.text}</span>`;
        
        const card = document.querySelector(`.word-card[data-id="${id}"]`);
        card.style.visibility = 'hidden';

        score++;
        document.getElementById('score').textContent = score;
        if (score === 10) endGame("太棒了！你全部找對了！🏆");
    }

    function startGame() {
        startBtn.style.display = 'none';
        gameUI.style.display = 'block';
        initGame();
        gameInterval = setInterval(() => {
            timer--;
            document.getElementById('timer').textContent = timer;
            if (timer <= 0) endGame("時間到！再試一次吧 ⌛");
        }, 1000);
    }

    function endGame(msg) {
        clearInterval(gameInterval);
        alert(msg);
        startBtn.style.display = 'block';
        gameUI.style.display = 'none';
        startBtn.textContent = '重新挑戰';
    }

    startBtn.addEventListener('click', startGame);
</script>

<script src="../touch-support.js"></script>
</body>
</html>
