<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空間介詞大冒險 Preposition Adventure</title>
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --bg: #F5F7FA;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: var(--primary); text-align: center; }
        .level-btns { margin-bottom: 20px; }
        button {
            padding: 10px 20px; font-size: 16px; margin: 0 10px; cursor: pointer;
            border: none; border-radius: 5px; background-color: #ddd; transition: 0.3s;
        }
        button.active { background-color: var(--primary); color: white; }
        
        .game-board {
            background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%; max-width: 600px; padding: 30px; box-sizing: border-box;
            text-align: center;
        }
        
        .instruction { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #555; }
        
        /* 視覺展示區 */
        .visual-area {
            position: relative; height: 250px; background: #eef2f5; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; margin-bottom: 20px;
            overflow: hidden;
        }

        /* Level 1 基礎物件 */
        .box { width: 100px; height: 100px; background: #8E44AD; border: 3px solid #732D91; position: absolute; z-index: 2; }
        .ball { width: 40px; height: 40px; background: #E74C3C; border-radius: 50%; position: absolute; z-index: 3; cursor: grab; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
        
        /* Drop Zones (放置區) */
        .drop-zone { position: absolute; width: 60px; height: 60px; border: 2px dashed #aaa; border-radius: 10px; display: flex; justify-content: center; align-items: center; transition: 0.2s; z-index: 4; }
        .drop-zone.active { border-color: var(--primary); background: rgba(74, 144, 226, 0.2); }
        .drop-zone.correct { border-color: var(--success); background: rgba(46, 204, 113, 0.3); border-style: solid; }

        /* 位置座標 (相對於容器中心) */
        .zone-on { top: 10px; left: 50%; transform: translateX(-50%); }
        .zone-under { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .zone-in { top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; } /* in 會在盒子後面模擬 */
        .zone-next-to { top: 50%; left: 10%; transform: translateY(-50%); }
        
        /* 拖拽選項區 (文字填空用) */
        .options-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; min-height: 50px; }
        .draggable-word {
            padding: 10px 20px; background: var(--primary); color: white; border-radius: 20px;
            cursor: grab; font-weight: bold; user-select: none;
        }
        
        /* 填空句子 */
        .sentence { font-size: 22px; margin: 20px 0; }
        .word-drop-zone {
            display: inline-block; width: 100px; height: 35px; border-bottom: 3px dashed #666;
            vertical-align: bottom; transition: 0.3s; text-align: center; color: var(--success); font-weight: bold;
        }
        
        /* Level 2 客廳物件 */
        .furniture { font-size: 60px; position: absolute; z-index: 2; user-select: none; }
        .furniture.sofa { left: 20%; top: 40%; }
        .furniture.table { right: 20%; top: 50%; }
        
        .draggable-item { font-size: 40px; cursor: grab; position: absolute; bottom: 10px; z-index: 5; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>🗺️ 空間介詞大冒險</h1>
    
    <div class="level-btns">
        <button id="btnLvl1" class="active" onclick="startLevel(1)">Level 1: 基礎形狀</button>
        <button id="btnLvl2" onclick="startLevel(2)">Level 2: 混亂客廳</button>
    </div>

    <div class="game-board">
        <div id="instruction" class="instruction">載入中...</div>
        
        <div id="visualArea" class="visual-area">
            </div>

        <div id="sentenceArea" class="sentence hidden">
            </div>

        <div id="optionsArea" class="options-area">
            </div>
    </div>

    <script>
        // 題庫設定
        const questions = {
            1: [
                { type: 'place', text: "Put the ball <b>ON</b> the box.", targetZone: 'on', item: '<div class="ball" draggable="true" id="dragItem">球</div>', base: '<div class="box"></div>' },
                { type: 'fill', text: "The ball is _____ the box.", answer: 'under', visualClass: 'zone-under', visualItem: '<div class="ball">球</div>', base: '<div class="box"></div>', options: ['in', 'on', 'under', 'next to'] },
                { type: 'place', text: "Put the ball <b>NEXT TO</b> the box.", targetZone: 'next-to', item: '<div class="ball" draggable="true" id="dragItem">球</div>', base: '<div class="box"></div>' },
                { type: 'fill', text: "The ball is _____ the box.", answer: 'in', visualClass: 'zone-in', visualItem: '<div class="ball" style="opacity:0.6;">球</div>', base: '<div class="box" style="opacity:0.8;"></div>', options: ['on', 'in', 'behind', 'under'] }
            ],
            2: [
                { type: 'place', text: "Put the cat <b>ON</b> the sofa.", targetZone: 'on', targetAnchor: 'sofa', item: '<div class="draggable-item" draggable="true" id="dragItem">🐱</div>', base: '<div class="furniture sofa">🛋️</div><div class="furniture table">🪑</div>' },
                { type: 'fill', text: "The dog is _____ the table.", answer: 'under', visualClass: 'zone-under', targetAnchor: 'table', visualItem: '<div class="draggable-item" style="font-size:30px;">🐶</div>', base: '<div class="furniture sofa">🛋️</div><div class="furniture table">🪑</div>', options: ['on', 'under', 'between', 'behind'] },
                { type: 'place', text: "Put the pizza <b>NEXT TO</b> the table.", targetZone: 'next-to', targetAnchor: 'table', item: '<div class="draggable-item" draggable="true" id="dragItem">🍕</div>', base: '<div class="furniture sofa">🛋️</div><div class="furniture table">🪑</div>' },
            ]
        };

        let currentLevel = 1;
        let currentQIndex = 0;

        function startLevel(level) {
            currentLevel = level;
            currentQIndex = 0;
            document.getElementById('btnLvl1').classList.toggle('active', level === 1);
            document.getElementById('btnLvl2').classList.toggle('active', level === 2);
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentLevel][currentQIndex];
            const visualArea = document.getElementById('visualArea');
            const sentenceArea = document.getElementById('sentenceArea');
            const optionsArea = document.getElementById('optionsArea');
            const instruction = document.getElementById('instruction');

            // 初始化區域
            visualArea.innerHTML = '';
            sentenceArea.innerHTML = '';
            optionsArea.innerHTML = '';
            
            if (q.type === 'place') {
                // 模式 1：根據句子放置物品
                instruction.innerHTML = q.text;
                visualArea.innerHTML = q.base + q.item;
                sentenceArea.classList.add('hidden');
                
                // 設置目標放置區 (動態調整位置以適應Level 2的家具)
                const zone = document.createElement('div');
                zone.className = `drop-zone zone-${q.targetZone}`;
                zone.dataset.target = 'correct';
                if(q.targetAnchor === 'table') { zone.style.left = '80%'; zone.style.top = q.targetZone === 'under' ? '70%' : '50%'; }
                if(q.targetAnchor === 'sofa') { zone.style.left = '20%'; zone.style.top = q.targetZone === 'on' ? '25%' : '50%'; }
                visualArea.appendChild(zone);

                setupDragAndDrop('dragItem', '.drop-zone', true);

            } else if (q.type === 'fill') {
                // 模式 2：根據圖像填寫介詞
                instruction.innerHTML = "Look at the picture and fill in the blank.";
                
                // 渲染靜態畫面
                const staticZone = document.createElement('div');
                staticZone.className = `drop-zone ${q.visualClass} correct`;
                staticZone.style.border = 'none';
                staticZone.innerHTML = q.visualItem;
                if(q.targetAnchor === 'table') { staticZone.style.left = '80%'; staticZone.style.top = q.visualClass === 'zone-under' ? '70%' : '50%'; }
                
                visualArea.innerHTML = q.base;
                visualArea.appendChild(staticZone);

                // 渲染句子和空位
                sentenceArea.classList.remove('hidden');
                sentenceArea.innerHTML = q.text.replace('_____', `<div class="word-drop-zone" id="wordDropZone" data-answer="${q.answer}"></div>`);
                
                // 渲染單字選項
                q.options.sort(() => Math.random() - 0.5).forEach(opt => {
                    const word = document.createElement('div');
                    word.className = 'draggable-word';
                    word.draggable = true;
                    word.id = `word-${opt.replace(/\s/g, '')}`;
                    word.innerText = opt;
                    word.dataset.word = opt;
                    optionsArea.appendChild(word);
                });

                setupDragAndDrop('.draggable-word', '#wordDropZone', false);
            }
        }

        function setupDragAndDrop(dragSelector, dropSelector, isObjectPlace) {
            const draggables = isObjectPlace ? [document.getElementById(dragSelector)] : document.querySelectorAll(dragSelector);
            const dropZones = document.querySelectorAll(dropSelector);

            draggables.forEach(draggable => {
                if(!draggable) return;
                draggable.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', isObjectPlace ? 'item' : e.target.dataset.word);
                    e.target.style.opacity = '0.5';
                });
                draggable.addEventListener('dragend', (e) => {
                    e.target.style.opacity = '1';
                });
            });

            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('active');
                });
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('active');
                });
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('active');
                    const data = e.dataTransfer.getData('text/plain');

                    if (isObjectPlace && data === 'item' && zone.dataset.target === 'correct') {
                        // 物件放置正確
                        const item = document.getElementById(dragSelector);
                        zone.appendChild(item);
                        item.style.position = 'static';
                        zone.classList.add('correct');
                        setTimeout(nextQuestion, 1000);
                    } else if (!isObjectPlace && data === zone.dataset.answer) {
                        // 單字填寫正確
                        zone.innerText = data;
                        zone.style.borderBottom = "none";
                        document.querySelector(`[data-word="${data}"]`).classList.add('hidden');
                        setTimeout(nextQuestion, 1000);
                    } else {
                        // 錯誤反饋
                        zone.style.backgroundColor = '#FFD2D2';
                        setTimeout(() => zone.style.backgroundColor = '', 300);
                    }
                });
            });
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < questions[currentLevel].length) {
                loadQuestion();
            } else {
                document.getElementById('instruction').innerHTML = "🎉 恭喜完成本關卡！";
                document.getElementById('visualArea').innerHTML = '<div style="font-size:80px;">🏆</div>';
                document.getElementById('sentenceArea').classList.add('hidden');
            }
        }

        // 啟動遊戲
        startLevel(1);
    </script>
<script src="../touch-support.js"></script>
</body>
</html>
